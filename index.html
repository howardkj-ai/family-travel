<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道冒險護照 v7.0 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #3498db; --gold: #ffd700; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .info-panel { width: 100%; max-width: 400px; background: rgba(0,0,0,0.9); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--gold); box-sizing: border-box; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        
        /* 轉盤遮蔽 */
        #phaseSpin { text-align: center; }
        .spin-hint { color: var(--gold); font-size: 0.8rem; margin-bottom: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* 任務卡片 */
        .station-card { background: var(--paper); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-sizing: border-box; border-top: 8px solid var(--accent); }
        .mission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card { height: 100px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 8px; text-align: center; font-size: 0.75rem; }
        .card-back { background: #333; color: var(--gold); border: 2px solid var(--gold); font-size: 1.2rem; }
        .card-front { background: white; transform: rotateY(180deg); font-weight: 900; border: 2px solid var(--accent); }

        /* 日記手風琴與編輯器 */
        .journal-item { background: rgba(255,255,255,0.05); color: #ddd; border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; width: 100%; max-width: 400px; }
        .journal-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
        .journal-content { max-height: 0; overflow: hidden; transition: max-height 0.3s; background: var(--paper); color: #1a1008; }
        .journal-item.active .journal-content { max-height: 1000px; padding: 15px; }
        .edit-area { width: 100%; height: 150px; font-family: inherit; font-size: 0.85rem; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }

        .btn { padding: 12px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; width: 100%; font-size: 1rem; margin-bottom: 8px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-small { width: auto; padding: 5px 12px; font-size: 0.75rem; border-radius: 5px; }
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div class="info-panel">
        <div class="info-row">
            <div id="seasonTag" style="background:var(--green); padding:2px 8px; border-radius:5px; font-size:0.75rem;">判定季節中...</div>
            <div id="weatherTool">
                當前天氣：<span id="weatherDisplay" style="cursor:pointer; font-size:1.2rem;" onclick="cycleWeather()">☀️</span>
            </div>
        </div>
        <div class="info-row">
            <div><span id="displayName" style="color:var(--gold); font-weight:900;">---</span> <small id="displayRank"></small></div>
            <div>💰 <span id="totalPoints">0</span> P</div>
        </div>
    </div>

    <div id="phaseSpin">
        <div class="spin-hint">▼ 點擊轉盤開啟本季隨機冒險 ▼</div>
        <div style="position:relative; margin-bottom:20px; cursor:pointer;" onclick="handleSpin()">
            <canvas id="wheelCanvas" width="300" height="300"></canvas>
            <div style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); color:var(--gold); font-size:2rem;">▼</div>
        </div>
        <button id="spinBtn" class="btn btn-blue" onclick="handleSpin()">🎲 開始抽站</button>
    </div>

    <div id="phaseTask" class="hide">
        <div class="station-card">
            <h1 id="resName" style="margin:0; font-size:2.8rem;">車站</h1>
            <p id="resInfo" style="color:var(--accent); font-weight:900; margin:5px 0 15px 0;"></p>
            <div class="mission-grid" id="missionGrid"></div>
            <button onclick="showSummary()" class="btn btn-blue">🏁 結束冒險並撰寫遊記</button>
            <button class="weather-btn btn-small" style="background:#444; color:white; width:100%" onclick="searchLocalWeather()">🔍 直接搜尋當地氣象</button>
        </div>
    </div>

    <div style="width:100%; max-width:400px; margin-top:30px;">
        <h3 style="color:var(--gold); margin-bottom:15px;">📜 冒險日記紀錄</h3>
        <div id="journalList"></div>
    </div>

    <div id="summaryOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:888; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--paper); width:100%; max-width:350px; padding:25px; border-radius:15px; border:4px solid var(--gold);">
            <h3 style="margin-top:0; color:var(--accent);">📝 冒險成果結算</h3>
            <div id="sumContent" style="margin-bottom:15px; font-size:0.85rem; background:white; padding:15px; border-radius:8px; line-height:1.6; white-space:pre-wrap; border:1px solid #ddd; max-height:300px; overflow-y:auto;"></div>
            <button class="btn btn-blue" onclick="saveToJournal()">確認並存檔</button>
        </div>
    </div>

    <script>
        const SEASONS = {
            SPRING: { name: "🌸 春季支線慢走", months: [3,4,5], stations: ["瑞芳","侯硐","十分","平溪","菁桐","內灣","三義","三坑"], tid: "北部支線" },
            SUMMER: { name: "☀️ 夏季海邊室內", months: [6,7,8], stations: ["福隆","貢寮","外澳","大里","礁溪","基隆"], tid: "東北角/宜蘭" },
            AUTUMN: { name: "🍂 秋季山城遠征", months: [9,10,11], stations: ["集集","車埕","后里","泰安","成功","追分"], tid: "中部支線" },
            WINTER: { name: "❄️ 冬季都市溫泉", months: [12,1,2], stations: ["礁溪","台中","嘉義","新竹","板橋"], tid: "都會區" }
        };

        const WEATHER_ICONS = ["☀️", "☁️", "🌦️", "🌧️", "💨"];
        let state = {
            user: localStorage.getItem('tr_user') || "冒險者",
            points: parseInt(localStorage.getItem('tr_points')) || 0,
            history: JSON.parse(localStorage.getItem('tr_history')) || [],
            weatherIdx: 0,
            currentStation: null, sessionLog: [], sessionPoints: 0,
            angle: 0, speed: 0, spinning: false
        };

        function cycleWeather() {
            state.weatherIdx = (state.weatherIdx + 1) % WEATHER_ICONS.length;
            document.getElementById('weatherDisplay').innerText = WEATHER_ICONS[state.weatherIdx];
        }

        function getSeason() {
            const m = new Date().getMonth() + 1;
            if([3,4,5].includes(m)) return SEASONS.SPRING;
            if([6,7,8].includes(m)) return SEASONS.SUMMER;
            if([9,10,11].includes(m)) return SEASONS.AUTUMN;
            return SEASONS.WINTER;
        }

        function updateUI() {
            const season = getSeason();
            document.getElementById('seasonTag').innerText = season.name;
            document.getElementById('displayName').innerText = state.user;
            document.getElementById('totalPoints').innerText = state.points;
            document.getElementById('displayRank').innerText = state.points > 1500 ? "傳說車長" : "初探隊員";

            const list = document.getElementById('journalList');
            list.innerHTML = state.history.map((h, i) => `
                <div class="journal-item" id="j-${i}">
                    <div class="journal-header" onclick="toggleJournal(${i})">
                        <span>📅 ${h.date} - ${h.station}</span>
                        <span>▼</span>
                    </div>
                    <div class="journal-content">
                        <textarea class="edit-area" id="edit-${i}">${h.fullText}</textarea>
                        <div style="display:flex; justify-content:space-between; margin-top:10px;">
                            <button class="btn-small" style="background:var(--green); color:white;" onclick="updateHistory(${i})">💾 儲存修改</button>
                            <button class="btn-small" style="background:#c0392b; color:white;" onclick="deleteHistory(${i})">🗑️ 刪除此篇</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleJournal(i) {
            const el = document.getElementById(`j-${i}`);
            const isActive = el.classList.contains('active');
            document.querySelectorAll('.journal-item').forEach(item => item.classList.remove('active'));
            if(!isActive) el.classList.add('active');
        }

        function updateHistory(i) {
            state.history[i].fullText = document.getElementById(`edit-${i}`).value;
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            alert("修改已儲存！");
        }

        function deleteHistory(i) {
            if(!confirm("確定要刪除這筆紀錄嗎？積分不會收回。")) return;
            state.history.splice(i, 1);
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            updateUI();
        }

        // --- 轉盤邏輯 (隱藏內容) ---
        function drawWheel() {
            const c = document.getElementById('wheelCanvas').getContext('2d');
            const stations = getSeason().stations;
            const slice = (Math.PI*2) / stations.length;
            c.clearRect(0,0,300,300);
            for(let i=0; i<stations.length; i++){
                const s = state.angle + i*slice - Math.PI/2;
                c.beginPath(); c.moveTo(150,150); c.arc(150,150,145,s,s+slice);
                c.fillStyle = i%2 ? "#d4a84b" : "#e8c97a"; c.fill(); c.stroke();
                // 隱藏文字：除非停下來，否則顯示問號
                c.save(); c.translate(150,150); c.rotate(s + slice/2);
                c.textAlign="right"; c.fillStyle="#1a1008"; c.font="900 16px serif";
                c.fillText("❓未知小站", 130, 5); c.restore();
            }
        }

        function handleSpin() {
            if(state.spinning) return;
            state.spinning = true; state.speed = 0.4;
            const loop = () => {
                state.angle += state.speed;
                state.speed *= 0.985;
                drawWheel();
                if(state.speed > 0.002) requestAnimationFrame(loop);
                else finishSpin();
            };
            loop();
        }

        function finishSpin() {
            const stations = getSeason().stations;
            const slice = (Math.PI*2) / stations.length;
            const norm = ((-state.angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
            const idx = Math.floor(norm / slice) % stations.length;
            state.currentStation = stations[idx];
            state.spinning = false;
            
            setTimeout(() => {
                document.getElementById('phaseSpin').classList.add('hide');
                document.getElementById('phaseTask').classList.remove('hide');
                document.getElementById('resName').innerText = state.currentStation;
                document.getElementById('resInfo').innerText = `✨ 秘境小站解鎖：${state.currentStation}`;
                initMissions(); updateUI();
            }, 800);
        }

        function searchLocalWeather() {
            window.open(`https://www.google.com/search?q=${state.currentStation}車站+天氣`, '_blank');
        }

        // --- 任務邏輯 ---
        function initMissions() {
            const grid = document.getElementById('missionGrid'); grid.innerHTML = '';
            const tasks = [
                {t:`拍一張${state.currentStation}站牌合照`, p:200, icon:"📸"},
                {t:`尋找該站附近的地圖導覽`, p:100, icon:"🗺️"},
                {t:`在${state.currentStation}執行指定動作`, p:150, icon:"💃"}
            ];
            tasks.forEach(m => {
                const div = document.createElement('div'); div.className = 'card';
                div.innerHTML = `<div class="card-inner"><div class="card-back">${m.icon}</div><div class="card-front">${m.t}</div></div>`;
                div.onclick = function() {
                    if(this.classList.contains('flipped')) return;
                    this.classList.add('flipped');
                    if(confirm(`挑戰：${m.t}？`)) {
                        const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        state.sessionPoints += m.p;
                        state.sessionLog.push(`[${now} / 天氣:${WEATHER_ICONS[state.weatherIdx]}] ${m.t}`);
                        alert("完成任務！");
                    }
                };
                grid.appendChild(div);
            });
        }

        function showSummary() {
            const d = new Date();
            let text = `【${getSeason().name}】冒險實錄\n`;
            text += `📅 日期：${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}\n`;
            text += `📍 目標車站：${state.currentStation}\n`;
            text += `👤 冒險者：${state.user}\n`;
            text += `--------------------------\n`;
            text += state.sessionLog.length > 0 ? state.sessionLog.join('\n') : "純粹呼吸該站空氣，未執行具體任務。";
            text += `\n--------------------------\n`;
            text += `💰 本次冒險獲得：${state.sessionPoints} P`;
            
            document.getElementById('sumContent').innerText = text;
            document.getElementById('summaryOverlay').style.display = 'flex';
        }

        function saveToJournal() {
            state.history.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                station: state.currentStation,
                points: state.sessionPoints,
                fullText: document.getElementById('sumContent').innerText
            });
            state.points += state.sessionPoints;
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            localStorage.setItem('tr_points', state.points);
            
            // 重置並返回
            state.currentStation = null; state.sessionLog = []; state.sessionPoints = 0;
            document.getElementById('summaryOverlay').style.display = 'none';
            document.getElementById('phaseTask').classList.add('hide');
            document.getElementById('phaseSpin').classList.remove('hide');
            updateUI();
        }

        function initApp() {
            const n = prompt("輸入您的冒險代號", state.user);
            if(n) state.user = n;
            localStorage.setItem('tr_user', state.user);
            updateUI(); drawWheel();
            requestAnimationFrame(() => {});
        }

        initApp();
    </script>
</body>
</html>
