<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>рҹҡҶ йҗөйҒ“еҶ’йҡӘ LifeOS v4.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #3498db; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; }
        .header { text-align: center; color: var(--paper); margin-bottom: 15px; }
        .header h1 { font-size: 1.6rem; margin: 0; letter-spacing: 0.1em; }
        
        /* Wheel Container */
        .wheel-wrap { position: relative; margin-bottom: 20px; }
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 0 4px var(--accent); }
        .pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); z-index: 10; width: 25px; }

        button { padding: 12px 20px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; transition: 0.2s; }
        #actionBtn { background: linear-gradient(135deg, #d4580a, #f07a2a); color: white; min-width: 130px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #actionBtn.stop { background: #c0392b; }

        /* Card System */
        #resultCard { width: 100%; max-width: 400px; background: var(--paper); border-radius: 15px; padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); display: none; margin-top: 10px; border-top: 10px solid var(--accent); }
        .station-name { font-size: 2.8rem; font-weight: 900; margin: 5px 0; line-height: 1.1; }
        
        /* Weather Bar */
        .weather-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(0,0,0,0.05); padding: 8px 12px; border-radius: 10px; }
        .weather-selector { display: flex; gap: 5px; }
        .w-btn { font-size: 0.75rem; padding: 6px 12px; background: #ddd; border-radius: 6px; border: 1px solid #ccc; }
        .w-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
        .search-hint { font-size: 0.7rem; color: var(--blue); text-decoration: none; font-weight: 900; display: flex; align-items: center; gap: 4px; }
        
        /* Mission UI */
        .mission-step { background: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .mission-text { font-size: 0.95rem; font-weight: 700; display: block; margin: 5px 0; color: #333; }
        
        /* Collection Wall */
        .record-wall { width: 100%; max-width: 400px; margin-top: 30px; color: var(--paper); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; text-align: center; }
        .badges-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .badge-done { background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="header">
        <h1>рҹҡҶ йҗөйҒ“еӨ§еҶ’йҡӘ</h1>
        <div id="stats" style="font-size:0.6rem; opacity:0.5; letter-spacing: 1px;">ADVENTURE LOG: 0 / 15</div>
    </div>

    <div class="wheel-wrap">
        <svg class="pointer" viewBox="0 0 28 36"><polygon points="14,34 2,4 26,4" fill="#d4580a" stroke="#1a1008" stroke-width="2"/></svg>
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
    </div>

    <button id="actionBtn">рҹҺІ й–Ӣе§Ӣж—ӢиҪү</button>

    <div id="resultCard">
        <div class="weather-bar">
            <div class="weather-selector">
                <button id="wSunny" class="w-btn active" onclick="setWeather('sunny')">вҳҖпёҸ жҷҙеӨ©</button>
                <button id="wRainy" class="w-btn" onclick="setWeather('rainy')">рҹҢ§пёҸ йӣЁеӨ©</button>
            </div>
            <a id="weatherSearch" href="#" target="_blank" class="search-hint">рҹ”Қ жҹҘеҚіжҷӮеӨ©ж°Ј</a>
        </div>

        <div id="resName" class="station-name"></div>
        <div id="resInfo" style="font-size:0.8rem; color:var(--accent); font-weight:bold; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;"></div>
        
        <div id="missionArea">
            <div id="missionContainer"></div>
            <button onclick="drawNewMission()" style="width:100%; background:var(--blue); color:white; margin-top:10px; border-radius:8px; box-shadow: 0 4px 0 #2980b9;">вһ• еҶҚжҠҪдёҖеҖӢд»»еӢҷ</button>
            <button onclick="saveAndFinish()" style="width:100%; background:var(--green); color:white; margin-top:15px; border-radius:8px; box-shadow: 0 4px 0 #1e5624;">вң… зөҗжқҹдёҰеӯҳжӘ”</button>
        </div>
    </div>

    <div class="record-wall">
        <div style="font-size:0.7rem; letter-spacing:2px; opacity:0.6; font-weight:900;">COLLECTED STATIONS</div>
        <div id="badges" class="badges-container"></div>
        <button onclick="clearRecords()" style="margin-top:30px; font-size:0.6rem; background:none; color:white; opacity:0.2;">RESET ALL DATA</button>
    </div>

    <script>
        const STATIONS = [
            { name: "з‘һиҠі", city: "ж–°еҢ—", food: "йҫҚйііи…ҝ", time: "40min" }, { name: "дҫҜзЎҗ", city: "ж–°еҢ—", food: "зӨҰе·Ҙйәө", time: "50min" },
            { name: "еҚҒеҲҶ", city: "ж–°еҢ—", food: "иҠұз”ҹжҚІ", time: "70min" }, { name: "зҰҸйҡҶ", city: "ж–°еҢ—", food: "дҫҝз•¶", time: "65min" },
            { name: "зӨҒжәӘ", city: "е®ңиҳӯ", food: "и”ҘжІ№йӨ…", time: "90min" }, { name: "е№іжәӘ", city: "ж–°еҢ—", food: "йәөиҢ¶", time: "80min" },
            { name: "иҸҒжЎҗ", city: "ж–°еҢ—", food: "йӣһжҚІ", time: "85min" }, { name: "е…§зҒЈ", city: "ж–°з«№", food: "йҮҺи–‘иҠұзІҪ", time: "95min" },
            { name: "дёүзҫ©", city: "иӢ—ж —", food: "зІ„жўқ", time: "110min" }, { name: "еӨ§йҮҢ", city: "е®ңиҳӯ", food: "зҹіиҠұеҮҚ", time: "80min" },
            { name: "еҗҲиҲҲ", city: "ж–°з«№", food: "дёӢеҚҲиҢ¶", time: "100min" }, { name: "еҙҺй Ӯ", city: "иӢ—ж —", food: "иҘҝз“ң", time: "90min" },
            { name: "и«Үж–Ү", city: "иӢ—ж —", food: "д№ҫиІЁ", time: "105min" }, { name: "дёүеқ‘", city: "ж–°з«№", food: "иҸңеҢ…", time: "70min" },
            { name: "еҜҢеІЎ", city: "жЎғең’", food: "иұ¬и…і", time: "60min" }
        ];

        const MISSION_DB = {
            sunny: ["жүҫйҷҪе…үзҒ‘иҗҪиҷ•жӢҚејөе…Ёе®¶зҰҸ вҳҖпёҸ", "е°Ӣжүҫз•¶ең°жңҖиүІеҪ©й®®иұ”зҡ„е»әзҜүй–ҖзӘ— рҹҺЁ", "иІ·еҶ°е“Ғ/ж¶јйЈІдёҰиҲҮи»Ҡз«ҷеҗҲеҪұ рҹҚҰ", "жүҫеҮәиЎ—й ӯдёҠзҡ„еҪұеӯҗи—қиЎ“дёҰжӢҚдёӢдҫҶ рҹ‘Ө", "жүҫдёҖеҖӢиғҪзңӢиҰӢйҒ ж–№еұұзЁңз·ҡзҡ„иҰ–и§’ вӣ°пёҸ"],
            rainy: ["еңЁи»Ҡз«ҷйқңйқңиҒҪйӣЁиҒІ 30 з§’ рҹҢ§пёҸ", "жүҫдёҖе®¶жңүеұӢз°·зҡ„иҖҒеә—и§ҖеҜҹйӣЁдёӯиЎ—жҷҜ вҳ”", "е°ӢжүҫйӣЁеӨ©йҷҗе®ҡзҡ„еҖ’еҪұжӢҚдёҖејөз…§ рҹ“ё", "еңЁи»Ҡз«ҷе…§жүҫдёҖеҖӢжңҖжә«йҰЁзҡ„и§’иҗҪеҗҲз…§ вҳ•", "и§ҖеҜҹйӣЁж»ҙеңЁдёҚеҗҢжқҗиіӘиЎЁйқўи·іеӢ•зҡ„жЁЈеӯҗ рҹ’§"],
            general: ["жЁЎд»ҝз«ҷзүҢдёҠзҡ„е§ҝеӢў/ж–Үеӯ—жӢҚз…§ рҹ•ә", "е•ҸеңЁең°дәәпјҡйҷ„иҝ‘е“ӘиЈЎйўЁжҷҜ/йЈҹзү©жңҖжҺЁпјҹрҹ—ЈпёҸ", "ж”¶йӣҶдёҖејөз•¶ең°зү№иүІзҡ„еӮіе–®жҲ–еә—еҗҚзүҮ рҹҺ«", "жүҫеҮәи»Ҡз«ҷе…§жңҖиҖҒзҡ„дёҖеҖӢзү©д»¶/жҷӮйҗҳ вҸ°", "жүҫеҮәйҖҷиЈЎжңҖжңүи¶Јзҡ„дёҖеҖӢи·ҜжЁҷеҗҚзЁұ рҹ“Қ", "жүҫдёҖеҖӢеҫһжңӘиҰӢйҒҺзҡ„е»әзҜүиЈқйЈҫжӢҚдёӢдҫҶ рҹҸ ", "е…Ёе®¶еңЁеҮәе…ҘеҸЈжӢҚдёҖејөжҢ‘жҲ°жҲҗеҠҹеҗҲз…§ рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ", "жүҫеҮәйҖҷз«ҷжӯ·еҸІжңҖжӮ д№…зҡ„и§ЈиӘӘзүҢ рҹ“ң"]
        };

        let angle = 0, speed = 0, state = "IDLE", currentSt = null, currentWeather = 'sunny';
        let history = JSON.parse(localStorage.getItem('vfx_travel_history')) || [];
        let activeTasks = [];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            const r = canvas.width / 2;
            ctx.clearRect(0,0,300,300);
            const slice = (Math.PI*2)/STATIONS.length;
            STATIONS.forEach((st, i) => {
                const s = angle + i*slice - Math.PI/2;
                ctx.beginPath(); ctx.moveTo(r,r); ctx.arc(r,r,r-5,s,s+slice);
                ctx.fillStyle = history.includes(st.name) ? "#4a3a2a" : (i%2?"#e8c97a":"#d4a84b");
                ctx.fill(); ctx.stroke();
                ctx.save(); ctx.translate(r,r); ctx.rotate(s+slice/2+Math.PI/2);
                ctx.fillStyle = history.includes(st.name) ? "#777" : "#1a1008";
                ctx.font = "bold 12px serif"; ctx.textAlign="center"; ctx.fillText(st.name,0,-r*0.75); ctx.restore();
            });
        }

        document.getElementById('actionBtn').onclick = function() {
            if(state==="IDLE"){ 
                state="SPINNING"; speed=0.25; 
                this.innerText="рҹӣ‘ еҒңпјҒ"; this.classList.add("stop"); 
                document.getElementById('resultCard').style.display='none'; 
            }
            else if(state==="SPINNING"){ state="SLOWING"; this.style.display="none"; }
        };

        function update() {
            if(state==="SPINNING") angle+=speed;
            else if(state==="SLOWING"){ speed*=0.985; angle+=speed; if(speed<0.002){ state="IDLE"; finish(); } }
            draw(); requestAnimationFrame(update);
        }

        function finish() {
            const stopAngle = ((-angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const idx = Math.floor(stopAngle / ((Math.PI * 2) / STATIONS.length));
            currentSt = STATIONS[idx];

            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resName').innerText = currentSt.name;
            document.getElementById('resInfo').innerText = `рҹ“Қ ${currentSt.city} В· рҹҚұ ${currentSt.food} В· рҹ•’ и»ҠзЁӢ ${currentSt.time}`;
            
            // жӣҙж–°жҗңе°ӢйҖЈзөҗ
            document.getElementById('weatherSearch').href = `https://www.google.com/search?q=${currentSt.name}еӨ©ж°Ј`;
            
            document.getElementById('missionContainer').innerHTML = "";
            activeTasks = [];
            drawNewMission(); 

            document.getElementById('actionBtn').style.display="inline-block";
            document.getElementById('actionBtn').innerText="рҹҺІ еҶҚж¬Ўж—ӢиҪү";
            document.getElementById('actionBtn').classList.remove("stop");
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.setWeather = function(type) {
            currentWeather = type;
            document.getElementById('wSunny').classList.toggle('active', type==='sunny');
            document.getElementById('wRainy').classList.toggle('active', type==='rainy');
        };

        window.drawNewMission = function() {
            const pool = [...MISSION_DB.general, ...MISSION_DB[currentWeather]];
            let task = pool[Math.floor(Math.random()*pool.length)];
            if(activeTasks.includes(task) && activeTasks.length < pool.length) return drawNewMission();
            activeTasks.push(task);

            const div = document.createElement('div');
            div.className = "mission-step";
            div.innerHTML = `<span style="font-size:0.6rem; color:var(--accent); font-weight:900;">GOAL ${activeTasks.length}</span><span class="mission-text">${task}</span>`;
            document.getElementById('missionContainer').appendChild(div);
        };

        window.saveAndFinish = function() {
            if(confirm(`зўәе®ҡе®ҢжҲҗ ${currentSt.name} зҡ„жҢ‘жҲ°дёҰеӯҳжӘ”пјҹ`)) {
                if(!history.includes(currentSt.name)) {
                    history.push(currentSt.name);
                    localStorage.setItem('vfx_travel_history', JSON.stringify(history));
                }
                document.getElementById('resultCard').style.display = "none";
                updateUI();
            }
        };

        function updateUI() {
            document.getElementById('stats').innerText = `ADVENTURE LOG: ${history.length} / 15`;
            document.getElementById('badges').innerHTML = history.map(h => `<span class="badge-done">вң“ ${h}</span>`).join('');
            draw();
        }

        window.clearRecords = function() { if(confirm("зўәе®ҡйҮҚзҪ®жүҖжңүеҶ’йҡӘзҙҖйҢ„пјҹ")) { localStorage.clear(); history=[]; updateUI(); } };

        updateUI(); update();
    </script>
</body>
</html>
