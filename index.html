<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道冒險護照 v5.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #3498db; --gold: #ffd700; --epic: #9b59b6; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; }
        
        /* 歡迎與設定區 */
        #setupOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: var(--paper); padding: 30px; border-radius: 15px; width: 100%; max-width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid var(--accent); border-radius: 5px; font-family: inherit; box-sizing: border-box; }

        .status-bar { width: 100%; max-width: 400px; background: rgba(0,0,0,0.7); color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 0.8rem; border: 1px solid var(--gold); box-sizing: border-box; }
        
        /* 轉盤與天氣 */
        .weather-select { display: flex; gap: 5px; margin-bottom: 15px; }
        .w-btn { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid var(--paper); background: none; color: var(--paper); cursor: pointer; font-size: 0.7rem; }
        .w-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        .wheel-wrap { position: relative; margin-bottom: 20px; cursor: pointer; }
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.6); background: #333; }
        
        /* 任務卡片 */
        .mission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; width: 100%; }
        .card { height: 130px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 8px; box-sizing: border-box; border: 2px solid rgba(0,0,0,0.1); }
        .card-back { background: linear-gradient(135deg, #444, #222); color: white; font-weight: 900; }
        .card-front { background: white; transform: rotateY(180deg); font-size: 0.75rem; flex-direction: column; text-align: center; }

        /* 通用按鈕 */
        .btn { padding: 12px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; width: 100%; margin-bottom: 8px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }

        /* 結算/回顧彈窗 */
        #summaryOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 150; display: none; align-items: center; justify-content: center; padding: 20px; }
        .summary-paper { background: var(--paper); width: 100%; max-width: 350px; padding: 25px; border-radius: 2px; position: relative; box-shadow: 0 0 30px var(--gold); border: 1px solid #dcd0ba; }
        .summary-content { border-top: 2px solid #333; border-bottom: 2px solid #333; margin: 15px 0; padding: 15px 0; max-height: 60vh; overflow-y: auto; text-align: left; font-size: 0.85rem; line-height: 1.6; }

        /* 紀錄牆 */
        .badge { background: rgba(255,255,255,0.15); color: white; padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
        
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="setupOverlay" class="hide">
        <div class="setup-card">
            <h2 style="margin-top:0">冒險者登錄</h2>
            <p style="font-size:0.8rem">請輸入你的冒險代號：</p>
            <input type="text" id="userNameInput" placeholder="例如：小明隊長">
            <button class="btn btn-blue" onclick="saveUser()">開始冒險之旅</button>
        </div>
    </div>

    <div class="status-bar">
        <div>👤 <span id="displayUserName">冒險者</span></div>
        <div>💰 總積分: <span id="totalPoints">0</span></div>
    </div>

    <div id="phaseSpin" class="wheel-container">
        <div class="weather-select">
            <button class="w-btn active" onclick="setWeather('sunny', this)">☀️ 晴天</button>
            <button class="w-btn" onclick="setWeather('cloudy', this)">☁️ 陰天</button>
            <button class="w-btn" onclick="setWeather('rainy', this)">☔ 雨天</button>
        </div>
        <div class="wheel-wrap" onclick="handleSpinClick()">
            <canvas id="wheelCanvas" width="300" height="300"></canvas>
        </div>
        <button id="spinBtn" class="btn btn-blue" onclick="handleSpinClick()">🎲 開始啟動轉盤</button>
    </div>

    <div id="phaseTask" class="hide">
        <div id="resultCard" style="background:var(--paper); padding:20px; border-radius:15px; width:100%; max-width:400px; box-sizing:border-box;">
            <div id="resName" style="font-size:2.5rem; font-weight:900;">---</div>
            <div id="resInfo" style="font-size:0.8rem; color:#666; margin-bottom:10px;"></div>
            
            <div id="missionSelectionArea">
                <p style="font-weight:900; font-size:0.9rem;">🎁 抽一張任務卡</p>
                <div class="mission-grid" id="missionGrid"></div>
            </div>

            <div id="missionActionArea" class="hide">
                <div id="activeMissionDesc" style="background:white; padding:15px; border-radius:10px; border:2px solid var(--gold); margin-bottom:15px; font-weight:900; text-align:center;"></div>
                <button class="btn btn-green" onclick="recordMission(true)">✅ 任務達成</button>
                <button class="btn" style="background:#c0392b; color:white" onclick="recordMission(false)">❌ 無法執行</button>
            </div>

            <div id="sessionLog" style="font-size:0.7rem; background:rgba(0,0,0,0.05); padding:10px; border-radius:5px; margin:10px 0;">
                <strong>本站動態：</strong><br><span id="doneList">尚未開始</span>
            </div>

            <button onclick="showSummary()" class="btn btn-blue">🏁 結束冒險並寫日誌</button>
        </div>
    </div>

    <div id="summaryOverlay" onclick="if(event.target==this) this.style.display='none'">
        <div class="summary-paper">
            <h2 id="sumTitle" style="text-align:center; margin:0; font-size:1.2rem;">📝 冒險日誌</h2>
            <div class="summary-content" id="sumContent"></div>
            <button id="saveJournalBtn" class="btn btn-blue" onclick="saveAndContinue()">確認並存入護照</button>
            <button id="closeJournalBtn" class="btn hide" style="background:#999; color:white" onclick="document.getElementById('summaryOverlay').style.display='none'">關閉回顧</button>
        </div>
    </div>

    <div style="margin-top:30px; width:100%; max-width:400px;">
        <p style="color:white; opacity:0.5; font-size:0.7rem; text-align:center;">—— 📖 冒險者護照紀錄 ——</p>
        <div id="badges"></div>
        <button onclick="if(confirm('確定全清？')) {localStorage.clear(); location.reload();}" style="width:100%; background:none; border:none; color:#444; font-size:0.6rem; margin-top:20px;">[ 清除所有紀錄 ]</button>
    </div>

    <script>
        const STATIONS = [
            { name: "瑞芳", food: "龍鳳腿", local: "找到『瑞芳』書法站牌拍照" },
            { name: "侯硐", food: "礦工麵", local: "數出至少 5 隻不同顏色的貓" },
            { name: "十分", food: "花生捲", local: "拍下火車經過民宅門口的瞬間" },
            { name: "福隆", food: "便當", local: "找到舊草嶺隧道標誌合照" },
            { name: "礁溪", food: "蔥油餅", local: "完成一次公園免費足湯體驗" }
        ];

        const GEN_MISSIONS = {
            sunny: [{t:"在站牌前拍一張全家大跳躍",p:100}, {t:"捕捉影子與車站建築的合影",p:50}],
            cloudy: [{t:"尋找車站內最怪異的角落拍一張",p:100}, {t:"模仿路人的姿勢拍一張照",p:50}],
            rainy: [{t:"拍一張雨滴落在月台的特寫",p:100}, {t:"尋找躲雨的流浪貓或小生物",p:150}],
            all: [{t:"找一個路標並指著它拍帥照",p:50}, {t:"找出這站最老的設施",p:100}]
        };

        let state = {
            user: localStorage.getItem('tr_user') || "",
            history: JSON.parse(localStorage.getItem('tr_history')) || [],
            totalPoints: parseInt(localStorage.getItem('tr_points')) || 0,
            currentStation: JSON.parse(localStorage.getItem('tr_active')) || null,
            weather: 'sunny',
            sessionPoints: 0,
            sessionDone: [],
            angle: 0, speed: 0, wheelState: "IDLE"
        };

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function init() {
            if(!state.user) document.getElementById('setupOverlay').classList.remove('hide');
            if(state.currentStation) showPhase('task');
            updateUI();
            requestAnimationFrame(animate);
        }

        function saveUser() {
            const val = document.getElementById('userNameInput').value;
            if(!val) return alert("請輸入名字");
            state.user = val;
            localStorage.setItem('tr_user', val);
            document.getElementById('setupOverlay').classList.add('hide');
            updateUI();
        }

        function setWeather(w, btn) {
            state.weather = w;
            document.querySelectorAll('.w-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // --- 轉盤控制 ---
        function handleSpinClick() {
            if(state.wheelState==="IDLE") { state.wheelState="SPINNING"; state.speed=0.25; document.getElementById('spinBtn').innerText="🛑 點擊停止"; }
            else if(state.wheelState==="SPINNING") { state.wheelState="SLOWING"; document.getElementById('spinBtn').disabled=true; }
        }

        function animate() {
            if(state.wheelState==="SPINNING") state.angle += state.speed;
            else if(state.wheelState==="SLOWING") { state.angle += state.speed; state.speed *= 0.985; if(state.speed<0.002) { state.wheelState="IDLE"; finishSpin(); } }
            drawWheel(); requestAnimationFrame(animate);
        }

        function drawWheel() {
            const r = 150; ctx.clearRect(0,0,300,300);
            for(let i=0; i<12; i++) {
                const s = state.angle + i*(Math.PI/6) - Math.PI/2;
                ctx.beginPath(); ctx.moveTo(r,r); ctx.arc(r,r,r-5,s,s+(Math.PI/6));
                ctx.fillStyle = i%2 ? "#d4a84b" : "#e8c97a";
                ctx.fill(); ctx.stroke();
            }
        }

        function finishSpin() {
            const stopAngle = ((-state.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const idx = Math.floor(stopAngle / (Math.PI/6)) % STATIONS.length;
            state.currentStation = STATIONS[idx];
            state.sessionPoints = 0; state.sessionDone = [];
            localStorage.setItem('tr_active', JSON.stringify(state.currentStation));
            showPhase('task'); updateUI();
        }

        // --- 任務系統 ---
        function renderCards() {
            document.getElementById('missionSelectionArea').classList.remove('hide');
            document.getElementById('missionActionArea').classList.add('hide');
            const grid = document.getElementById('missionGrid'); grid.innerHTML = '';
            
            let pool = [{t: state.currentStation.local, p: 300, type: "🚩 當地"}];
            let subPool = [...GEN_MISSIONS.all, ...GEN_MISSIONS[state.weather]];
            pool = pool.concat(subPool.sort(() => 0.5 - Math.random()).slice(0, 2));

            pool.sort(() => 0.5-Math.random()).forEach(m => {
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<div class="card-inner"><div class="card-back">?</div><div class="card-front"><b>${m.type||'🎲'}</b><br>${m.t}</div></div>`;
                card.onclick = function() {
                    if(this.classList.contains('flipped')) return;
                    this.classList.add('flipped');
                    setTimeout(() => {
                        document.getElementById('missionSelectionArea').classList.add('hide');
                        document.getElementById('missionActionArea').classList.remove('hide');
                        document.getElementById('activeMissionDesc').innerText = m.t;
                        state.lastMission = m;
                    }, 600);
                };
                grid.appendChild(card);
            });
        }

        function recordMission(success) {
            if(success) {
                state.sessionPoints += state.lastMission.p;
                state.sessionDone.push(`✅ ${state.lastMission.t} (+${state.lastMission.p}P)`);
            } else {
                state.sessionDone.push(`❌ 跳過：${state.lastMission.t}`);
            }
            updateUI(); renderCards();
        }

        // --- 遊記顯示 ---
        function showSummary() {
            const now = new Date();
            const weatherEmoji = {sunny: '☀️', cloudy: '☁️', rainy: '☔'}[state.weather];
            document.getElementById('summaryOverlay').style.display = 'flex';
            document.getElementById('saveJournalBtn').classList.remove('hide');
            document.getElementById('closeJournalBtn').classList.add('hide');
            
            document.getElementById('sumContent').innerHTML = `
                <b>冒險者：</b> ${state.user}<br>
                <b>日期：</b> ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日<br>
                <b>天氣：</b> ${weatherEmoji}<br>
                <hr>
                <b>抵達車站：</b> ${state.currentStation.name}<br>
                <b>美食任務：</b> 成功品嚐了「${state.currentStation.food}」🍱<br>
                <b>執行軌跡：</b><br>${state.sessionDone.join('<br>') || '無執行任務'}<br>
                <hr>
                <b>本站成就積分：</b> +${state.sessionPoints} P
            `;
        }

        function viewJournal(idx) {
            const h = state.history[idx];
            document.getElementById('summaryOverlay').style.display = 'flex';
