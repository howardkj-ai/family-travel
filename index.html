<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>🚆 鐵道冒險護照 v5.8 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #3498db; --gold: #ffd700; --purple: #9b59b6; --gray: #7f8c8d; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; }
        
        /* 門神 */
        #setupOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .setup-card { background: var(--paper); padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; border: 4px solid var(--gold); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid var(--accent); border-radius: 8px; font-family: inherit; font-size: 1rem; box-sizing: border-box; }

        /* 頂部資訊欄 */
        .info-panel { width: 100%; max-width: 400px; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--gold); font-size: 0.85rem; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .weather-icon { color: var(--gold); font-weight: 900; }

        /* 轉盤 & 卡片樣式 (承襲前版並優化) */
        .wheel-wrap { position: relative; margin: 15px 0; cursor: pointer; }
        #wheelCanvas { border-radius: 50%; background: #333; border: 4px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .mission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card { height: 140px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; text-align: center; }
        .card-back { background: #333; color: white; flex-direction: column; border: 1px solid #555; }
        .card-front { background: white; transform: rotateY(180deg); font-size: 0.8rem; font-weight: 900; border: 3px solid var(--gold); }
        .type-tag { font-size: 0.6rem; margin-top: 5px; padding: 2px 6px; border-radius: 4px; }

        /* 歷史紀錄區 */
        .history-section { width: 100%; max-width: 400px; margin-top: 30px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
        .history-item { background: rgba(255,255,255,0.1); color: #ddd; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .btn-del { background: #c0392b; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 0.7rem; cursor: pointer; }

        .btn { padding: 15px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; width: 100%; font-size: 1.1rem; margin-bottom: 10px; }
        .btn-blue { background: var(--blue); color: white; }
        .hide { display: none !important; }
        .footer { opacity: 0.3; color: white; font-size: 0.6rem; margin: 20px 0; text-align: center; }
    </style>
</head>
<body>

    <div id="setupOverlay">
        <div class="setup-card">
            <h2>🎖️ 冒險者登錄</h2>
            <input type="text" id="userNameInput" placeholder="冒險者大名">
            <input type="password" id="inviteCodeInput" placeholder="邀請碼">
            <button class="btn btn-blue" onclick="saveUser()">啟動冒險</button>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-row">
            <div>📅 <span id="currentDate">2026/04/08</span></div>
            <div class="weather-icon">☀️ 冒險好天氣</div>
        </div>
        <div class="info-row">
            <div>👤 <span id="displayUserName">---</span></div>
            <div>💰 總積分: <span id="totalPoints" style="color:var(--gold)">0</span></div>
        </div>
    </div>

    <div id="phaseSpin">
        <div class="wheel-wrap" onclick="handleSpinClick()">
            <canvas id="wheelCanvas" width="300" height="300"></canvas>
        </div>
        <button id="spinBtn" class="btn btn-blue" onclick="handleSpinClick()">🎲 轉動命運齒輪</button>
    </div>

    <div id="phaseTask" class="hide">
        <div style="background:var(--paper); padding:20px; border-radius:15px; width:100%; max-width:400px; box-sizing:border-box;">
            <div id="resName" style="font-size:2.5rem; font-weight:900;">車站</div>
            <div id="resInfo" style="color:#666; margin-bottom:15px; font-size:0.85rem;"></div>
            
            <div id="missionSelectUI">
                <p style="font-weight:900; font-size:0.85rem;">🎁 請選擇一個分類任務：</p>
                <div class="mission-grid" id="missionGrid"></div>
            </div>

            <div id="missionActionUI" class="hide">
                <div id="activeMissionDesc" style="background:white; padding:20px; border-radius:12px; border:3px solid var(--gold); margin-bottom:15px; font-weight:900; text-align:center;"></div>
                <button class="btn" style="background:var(--green); color:white;" onclick="recordMission(true)">✅ 挑戰成功</button>
                <button class="btn" style="background:#ccc;" onclick="recordMission(false)">❌ 放棄/換一個</button>
            </div>

            <button onclick="showSummary()" class="btn btn-blue" style="margin-top:10px;">🏁 離開本站</button>
        </div>
    </div>

    <div class="history-section">
        <h4 style="color:var(--gold); margin-top:0;">📜 冒險護照紀錄</h4>
        <div id="historyList"></div>
    </div>

    <div class="footer">v5.8.1 PRO | © 2026 Railway Adventure Studio</div>

    <div id="summaryOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:888; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--paper); width:100%; max-width:320px; padding:25px; border-radius:15px;">
            <h2 style="text-align:center; color:var(--accent);">站點冒險結算</h2>
            <div id="sumContent" style="margin:15px 0; font-size:0.9rem;"></div>
            <button class="btn btn-blue" onclick="saveAndContinue()">存入紀錄</button>
        </div>
    </div>

    <script>
        const _SECRET = "MjAyNg=="; 
        const STATIONS = [
            { name: "瑞芳", food: "龍鳳腿", local: "找到瑞芳書法站牌拍照" },
            { name: "侯硐", food: "礦工麵", local: "跟 3 隻不同的貓打招呼" },
            { name: "十分", food: "花生捲", local: "在鐵軌旁看一次放天燈" },
            { name: "福隆", food: "便當", local: "找到石城/草嶺隧道標誌" }
        ];

        // 豐富的通用任務池
        const GENERAL_POOL = {
            food: [{t:"買一樣從沒吃過的當地小吃",p:100}, {t:"拍下一張看起來最好吃的食物照",p:50}, {t:"幫家人買一罐飲料",p:80}],
            search: [{t:"找到這站最特別的彩色物品",p:100}, {t:"找出站內一個有數字的標誌",p:80}, {t:"發現一個很酷的印章並蓋下",p:120}],
            action: [{t:"跟車站外觀拍一張帥氣合照",p:150}, {t:"對著鏡頭做出驚訝的表情",p:100}, {t:"找到地圖並指點下一個去處",p:120}]
        };

        let state = {
            user: localStorage.getItem('tr_user') || "",
            history: JSON.parse(localStorage.getItem('tr_history')) || [],
            totalPoints: parseInt(localStorage.getItem('tr_points')) || 0,
            currentStation: null,
            sessionPoints: 0, sessionDone: [],
            usedInStation: [], // 防止同站重複
            angle: 0, speed: 0, wheelState: "IDLE"
        };

        function init() {
            if(state.user) document.getElementById('setupOverlay').classList.add('hide');
            // 設定日期
            const d = new Date();
            document.getElementById('currentDate').innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (${['日','一','二','三','四','五','六'][d.getDay()]})`;
            updateUI();
            requestAnimationFrame(animate);
        }

        function saveUser() {
            const name = document.getElementById('userNameInput').value.trim();
            const code = document.getElementById('inviteCodeInput').value.trim();
            if(name && code === atob(_SECRET)) {
                state.user = name; localStorage.setItem('tr_user', name);
                document.getElementById('setupOverlay').classList.add('hide');
                updateUI();
            } else { alert("資料錯誤！"); }
        }

        // --- 智慧任務抽卡 (不重複邏輯) ---
        function renderCards() {
            document.getElementById('missionSelectUI').classList.remove('hide');
            document.getElementById('missionActionUI').classList.add('hide');
            const grid = document.getElementById('missionGrid'); grid.innerHTML = '';
            
            // 基礎池：1在地 + 2通用
            let cards = [{t: state.currentStation.local, p: 300, type: "local", label: "🚩在地"}];
            
            // 從通用池抽 2 個「本站還沒用過」的任務
            const types = ['food', 'search', 'action'].sort(()=>0.5-Math.random());
            let added = 0;
            for(let type of types) {
                if(added >= 2) break;
                const available = GENERAL_POOL[type].filter(m => !state.usedInStation.includes(m.t));
                if(available.length > 0) {
                    const m = available[Math.floor(Math.random()*available.length)];
                    cards.push({...m, type: type, label: {food:'🍱美食',search:'🔍探索',action:'🎭挑戰'}[type]});
                    added++;
                }
            }

            cards.sort(()=>0.5-Math.random()).forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back"><span style="font-size:1.2rem">❓</span><div class="type-tag" style="background:var(--accent)">${m.label}</div></div>
                        <div class="card-front">${m.t}</div>
                    </div>`;
                card.onclick = function() {
                    this.classList.add('flipped');
                    setTimeout(() => {
                        document.getElementById('missionSelectUI').classList.add('hide');
                        document.getElementById('missionActionUI').classList.remove('hide');
                        document.getElementById('activeMissionDesc').innerText = m.t;
                        state.lastMission = m;
                    }, 500);
                };
                grid.appendChild(card);
            });
        }

        function recordMission(success) {
            if(success) {
                state.sessionPoints += state.lastMission.p;
                state.sessionDone.push(`✅ ${state.lastMission.t}`);
                state.usedInStation.push(state.lastMission.t); // 標記為已使用
            }
            renderCards();
            updateUI();
        }

        // --- 存檔與管理 ---
        function saveAndContinue() {
            const entry = {
                id: Date.now(),
                station: state.currentStation.name,
                p: state.sessionPoints,
                date: new Date().toLocaleDateString()
            };
            state.history.unshift(entry);
            state.totalPoints += state.sessionPoints;
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            localStorage.setItem('tr_points', state.totalPoints);
            
            state.currentStation = null;
            state.usedInStation = []; // 換站後重置重複檢查
            document.getElementById('summaryOverlay').style.display='none';
            showPhase('spin');
            updateUI();
        }

        function deleteHistory(id) {
            if(!confirm("確定要刪除這筆冒險紀錄嗎？積分也會扣除喔！")) return;
            const item = state.history.find(h => h.id === id);
            state.totalPoints -= item.p;
            state.history = state.history.filter(h => h.id !== id);
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            localStorage.setItem('tr_points', state.totalPoints);
            updateUI();
        }

        function updateUI() {
            document.getElementById('displayUserName').innerText = state.user || "---";
            document.getElementById('totalPoints').innerText = state.totalPoints;
            
            const hList = document.getElementById('historyList');
            hList.innerHTML = state.history.map(h => `
                <div class="history-item">
                    <div><b>${h.station}</b> <small>${h.date}</small> (+${h.p}P)</div>
                    <button class="btn-del" onclick="deleteHistory(${h.id})">刪除</button>
                </div>
            `).join('') || '<div style="color:#666; font-size:0.75rem;">尚無紀錄，開始冒險吧！</div>';

            if(state.currentStation) {
                document.getElementById('resName').innerText = state.currentStation.name;
                document.getElementById('resInfo').innerText = `本站推薦美食：${state.currentStation.food}`;
            }
        }

        // --- 轉盤動畫 (同前版) ---
        function handleSpinClick() {
            if(state.wheelState==="IDLE") { state.wheelState="SPINNING"; state.speed=0.25; }
            else if(state.wheelState==="SPINNING") { state.wheelState="SLOWING"; }
        }
        function animate() {
            if(state.wheelState==="SPINNING") state.angle += state.speed;
            else if(state.wheelState==="SLOWING") { state.angle += state.speed; state.speed *= 0.985; if(state.speed<0.002) { state.wheelState="IDLE"; finishSpin(); } }
            drawWheel(); requestAnimationFrame(animate);
        }
        function drawWheel() {
            const r=150; const c=document.getElementById('wheelCanvas').getContext('2d');
            c.clearRect(0,0,300,300);
            for(let i=0; i<12; i++) {
                const s = state.angle + i*(Math.PI/6) - Math.PI/2;
                c.beginPath(); c.moveTo(r,r); c.arc(r,r,r-5,s,s+(Math.PI/6));
                c.fillStyle = i%2 ? "#d4a84b" : "#e8c97a"; c.fill(); c.stroke();
            }
        }
        function finishSpin() {
            const stopAngle = ((-state.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            state.currentStation = STATIONS[Math.floor(stopAngle / (Math.PI/6)) % STATIONS.length];
            showPhase('task'); renderCards(); updateUI();
        }
        function showPhase(p) {
            document.getElementById('phaseSpin').className = (p==='spin' ? '' : 'hide');
            document.getElementById('phaseTask').className = (p==='task' ? '' : 'hide');
        }
        function showSummary() {
            document.getElementById('summaryOverlay').style.display='flex';
            document.getElementById('sumContent').innerText = `${state.currentStation.name} 站挑戰完成！本次獲得 ${state.sessionPoints} 積分。`;
        }

        init();
    </script>
</body>
</html>
