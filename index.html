<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道冒險護照 v6.2 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #3498db; --gold: #ffd700; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; }
        
        /* 頂部資訊 */
        .info-panel { width: 100%; max-width: 400px; background: rgba(0,0,0,0.9); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--gold); box-sizing: border-box; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .weather-btn { background: var(--accent); border: none; border-radius: 5px; color: white; padding: 5px 12px; font-size: 0.75rem; cursor: pointer; font-weight: 900; }

        /* 車站卡片 (初始隱藏) */
        .station-card { background: var(--paper); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-sizing: border-box; border-top: 8px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        
        /* 抽卡視覺 */
        .card { height: 110px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; text-align: center; }
        .card-back { background: #333; color: var(--gold); border: 2px solid var(--gold); font-size: 1.5rem; }
        .card-front { background: white; transform: rotateY(180deg); font-weight: 900; border: 3px solid var(--gold); font-size: 0.8rem; }

        /* 日記手風琴 */
        .journal-section { width: 100%; max-width: 400px; margin-top: 30px; }
        .journal-item { background: rgba(255,255,255,0.05); color: #ddd; border-radius: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .journal-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .journal-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: var(--paper); color: #1a1008; }
        .journal-item.active .journal-content { max-height: 800px; padding: 15px; border-top: 3px solid var(--accent); }

        .btn { padding: 15px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; width: 100%; font-size: 1.1rem; margin-bottom: 10px; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        .hide { display: none !important; }
        #setupOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="setupOverlay">
        <div style="background:var(--paper); padding:30px; border-radius:15px; width:100%; max-width:320px; text-align:center; border:4px solid var(--gold);">
            <h2 style="margin-top:0">🎖️ 冒險者登錄</h2>
            <input type="text" id="userNameInput" placeholder="輸入冒險代號" style="width:100%; padding:10px; margin-bottom:10px; border:2px solid var(--accent); border-radius:5px;">
            <input type="password" id="inviteCodeInput" placeholder="邀請碼" style="width:100%; padding:10px; margin-bottom:15px; border:2px solid var(--accent); border-radius:5px;">
            <button class="btn btn-blue" onclick="saveUser()">啟動冒險</button>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-row">
            <div>📅 <span id="currentDate">--/--</span></div>
            <div id="weatherArea" class="hide">
                <span id="weatherDisplay" style="cursor:pointer; font-size:1.2rem" onclick="changeWeather()">☀️</span>
                <button class="weather-btn" onclick="openWeather()">查當地氣象</button>
            </div>
        </div>
        <div class="info-row">
            <div>
                <span id="displayUserName" style="color:var(--gold); font-weight:900">---</span>
                <span id="displayRank" style="font-size:0.7rem; background:var(--accent); padding:2px 8px; border-radius:10px; margin-left:5px">等級計算中</span>
            </div>
            <div>💰 <span id="totalPoints">0</span> P</div>
        </div>
    </div>

    <div id="phaseSpin">
        <div style="position:relative; margin-bottom:20px; cursor:pointer;" onclick="handleSpinClick()">
            <div style="position:absolute; top:-15px; left:50%; transform:translateX(-50%); color:var(--gold); font-size:2rem; z-index:10;">▼</div>
            <canvas id="wheelCanvas" width="300" height="300"></canvas>
        </div>
        <button id="spinBtn" class="btn btn-blue" onclick="handleSpinClick()">🎲 決定目的地</button>
    </div>

    <div id="phaseTask" class="hide">
        <div class="station-card">
            <div id="resName" style="font-size:3rem; font-weight:900;">車站</div>
            <div id="resInfo" style="color:#d4580a; margin:5px 0 15px 0; font-weight:900; font-size:0.9rem;"></div>
            
            <div id="missionSelectUI">
                <div class="mission-grid" id="missionGrid"></div>
            </div>

            <div id="missionActionUI" class="hide">
                <div id="activeMissionDesc" style="background:white; padding:20px; border-radius:12px; border:3px solid var(--gold); margin-bottom:15px; font-weight:900; text-align:center;"></div>
                <button class="btn" style="background:var(--green); color:white;" onclick="recordMission(true)">✅ 挑戰成功</button>
                <button class="btn" style="background:#ccc;" onclick="recordMission(false)">❌ 換一個</button>
            </div>

            <button onclick="showSummary()" class="btn btn-blue" style="margin-top:10px;">🏁 結束行程並結算</button>
        </div>
    </div>

    <div class="journal-section">
        <h3 style="color:var(--gold); margin:0 0 10px 0;">📜 冒險者日記</h3>
        <div id="journalList"></div>
    </div>

    <div id="summaryOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:888; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--paper); width:100%; max-width:350px; padding:25px; border-radius:15px; border:4px solid var(--gold);">
            <h3 style="text-align:center; color:var(--accent); margin-top:0;">📝 冒險紀錄生成</h3>
            <div id="sumContent" style="margin:15px 0; font-size:0.85rem; background:white; padding:15px; border-radius:8px; line-height:1.6; white-space:pre-wrap; border:1px solid #ddd; max-height:300px; overflow-y:auto;"></div>
            <button class="btn btn-blue" onclick="saveAndContinue()">永久存入紀錄</button>
        </div>
    </div>

    <script>
        const _SECRET = "MjAyNg==";
        // 修正後的車站與氣象 TID (Town ID)
        const STATIONS = [
            { name: "瑞芳", food: "龍鳳腿", tid: "10017080" },
            { name: "侯硐", food: "礦工麵", tid: "10017080" },
            { name: "十分", food: "花生捲冰淇淋", tid: "10017150" },
            { name: "福隆", food: "經典鐵路便當", tid: "10017110" },
            { name: "礁溪", food: "溫泉蔥油餅", tid: "10002050" },
            { name: "三貂嶺", food: "廢墟咖啡", tid: "10017080" },
            { name: "牡丹", food: "古早味點心", tid: "10017100" },
            { name: "菁桐", food: "楊家雞捲", tid: "10017150" }
        ];

        const GEN_POOL = [
            {t:"在月台與進站的火車合照",p:150},
            {t:"找到一個該站特有的紀念戳章",p:100},
            {t:"尋找車站外最有特色的老房子",p:120},
            {t:"買一罐該站便利商店沒有的飲料",p:80},
            {t:"跟站務員或導覽牌合影",p:150}
        ];

        const WEATHERS = ["☀️ 晴朗", "🌧️ 下雨", "☁️ 多雲", "🌤️ 晴時多雲"];
        let state = {
            user: localStorage.getItem('tr_user') || "",
            history: JSON.parse(localStorage.getItem('tr_history')) || [],
            totalPoints: parseInt(localStorage.getItem('tr_points')) || 0,
            weatherIdx: 0,
            currentStation: null, sessionMissions: [], sessionPoints: 0,
            angle: 0, speed: 0, wheelState: "IDLE"
        };

        function init() {
            if(state.user) document.getElementById('setupOverlay').classList.add('hide');
            const d = new Date();
            document.getElementById('currentDate').innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
            updateUI();
            requestAnimationFrame(animate);
        }

        function saveUser() {
            const n = document.getElementById('userNameInput').value.trim();
            const c = document.getElementById('inviteCodeInput').value.trim();
            if(n && (state.user || c === atob(_SECRET))) {
                state.user = n; localStorage.setItem('tr_user', n);
                document.getElementById('setupOverlay').classList.add('hide');
                updateUI();
            } else { alert("請輸入正確資訊"); }
        }

        function changeWeather() { state.weatherIdx = (state.weatherIdx+1)%WEATHERS.length; updateUI(); }
        
        function openWeather() {
            if(!state.currentStation) return;
            // 修正氣象連結邏輯
            const url = `https://www.cwa.gov.tw/V8/C/W/Town/Town.html?TID=${state.currentStation.tid}`;
            window.open(url, '_blank');
        }

        function renderCards() {
            document.getElementById('missionSelectUI').classList.remove('hide');
            document.getElementById('missionActionUI').classList.add('hide');
            const grid = document.getElementById('missionGrid'); grid.innerHTML = '';
            
            // 隨機從通用池選 2 個，加上 1 個在地
            let pool = [...GEN_POOL].sort(() => 0.5 - Math.random());
            let cards = [
                {t: `[在地任務] 找出並完成${state.currentStation.name}特有的挑戰`, p:300, icon:"🚩"},
                {t: pool[0].t, p: pool[0].p, icon:"🔍"},
                {t: pool[1].t, p: pool[1].p, icon:"🎲"}
            ].sort(() => 0.5 - Math.random());

            cards.forEach(m => {
                const div = document.createElement('div'); div.className = 'card';
                div.innerHTML = `<div class="card-inner"><div class="card-back">${m.icon}</div><div class="card-front">${m.t}</div></div>`;
                div.onclick = function() {
                    if(this.classList.contains('flipped')) return;
                    this.classList.add('flipped');
                    setTimeout(() => {
                        document.getElementById('missionSelectUI').classList.add('hide');
                        document.getElementById('missionActionUI').classList.remove('hide');
                        document.getElementById('activeMissionDesc').innerText = m.t;
                        state.lastMission = m;
                    }, 600);
                };
                grid.appendChild(div);
            });
        }

        function recordMission(success) {
            if(success) {
                state.sessionPoints += state.lastMission.p;
                state.sessionMissions.push({t: state.lastMission.t, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})});
            }
            renderCards();
        }

        function showSummary() {
            const d = new Date();
            let text = `【鐵道探險紀錄表】\n`;
            text += `📅 日期：${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}\n`;
            text += `📍 地點：${state.currentStation.name} 站\n`;
            text += `👤 探險員：[${getRank(state.totalPoints)}] ${state.user}\n`;
            text += `🌡️ 當地天氣：${WEATHERS[state.weatherIdx]}\n`;
            text += `--------------------------\n`;
            text += `🚩 達成里程碑：\n`;
            if(state.sessionMissions.length > 0) {
                state.sessionMissions.forEach(m => {
                    text += ` • [${m.time}] ${m.t}\n`;
                });
            } else {
                text += ` • 抵達車站進行深度觀察與放空。\n`;
            }
            text += `🍱 補給點：品嚐了「${state.currentStation.food}」。\n`;
            text += `--------------------------\n`;
            text += `💰 總結分：+${state.sessionPoints} P\n`;
            text += `(紀錄時間：${new Date().toLocaleString()})`;

            document.getElementById('sumContent').innerText = text;
            document.getElementById('summaryOverlay').style.display = 'flex';
        }

        function saveAndContinue() {
            state.history.unshift({id: Date.now(), station: state.currentStation.name, points: state.sessionPoints, fullText: document.getElementById('sumContent').innerText, date: new Date().toLocaleDateString()});
            state.totalPoints += state.sessionPoints;
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            localStorage.setItem('tr_points', state.totalPoints);
            
            // 重置狀態並回到轉盤
            state.currentStation = null; state.sessionMissions = []; state.sessionPoints = 0;
            document.getElementById('summaryOverlay').style.display = 'none';
            document.getElementById('phaseTask').classList.add('hide');
            document.getElementById('phaseSpin').classList.remove('hide');
            updateUI();
        }

        function updateUI() {
            document.getElementById('displayUserName').innerText = state.user || "---";
            document.getElementById('totalPoints').innerText = state.totalPoints;
            document.getElementById('displayRank').innerText = getRank(state.totalPoints);
            document.getElementById('weatherDisplay').innerText = WEATHERS[state.weatherIdx].split(' ')[0];
            
            // 只有在任務階段才顯示天氣工具
            document.getElementById('weatherArea').classList.toggle('hide', !state.currentStation);
            
            if(state.currentStation) {
                document.getElementById('resName').innerText = state.currentStation.name;
                document.getElementById('resInfo').innerText = `🚂 建議補給：${state.currentStation.food}`;
            }

            const list = document.getElementById('journalList');
            list.innerHTML = state.history.map(h => `
                <div class="journal-item" id="j-${h.id}">
                    <div class="journal-header" onclick="toggleJournal(${h.id})">
                        <span>📅 ${h.date} - ${h.station}</span>
                        <span style="color:var(--accent)">+${h.points}P ▼</span>
                    </div>
                    <div class="journal-content">
                        <pre style="white-space:pre-wrap; font-family:inherit; font-size:0.85rem; line-height:1.6;">${h.fullText}</pre>
                        <div style="text-align:right; margin-top:10px;">
                            <button style="color:red; background:none; border:none; text-decoration:underline; cursor:pointer;" onclick="deleteJournal(${h.id})">🗑️ 移除此紀錄</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<div style="color:white; opacity:0.3; text-align:center;">冒險尚未開始...</div>';
        }

        function toggleJournal(id) {
            const el = document.getElementById(`j-${id}`);
            const wasActive = el.classList.contains('active');
            document.querySelectorAll('.journal-item').forEach(i => i.classList.remove('active'));
            if(!wasActive) el.classList.add('active');
        }

        function deleteJournal(id) {
            if(!confirm("確定要刪除嗎？")) return;
            const item = state.history.find(h => h.id === id);
            state.totalPoints -= item.points;
            state.history = state.history.filter(h => h.id !== id);
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            localStorage.setItem('tr_points', state.totalPoints);
            updateUI();
        }

        function getRank(p) {
            if(p < 500) return "鐵道實習生";
            if(p < 1500) return "初級探險家";
            if(p < 3000) return "資深背包客";
            return "傳說級車長";
        }

        // --- 轉盤核心邏輯 (精準度修正) ---
        function handleSpinClick() {
            if(state.wheelState==="IDLE") { 
                state.wheelState="SPINNING"; state.speed=0.35; 
                document.getElementById('spinBtn').innerText = "🛑 決定命運";
            } else if(state.wheelState==="SPINNING") { 
                state.wheelState="SLOWING"; 
                document.getElementById('spinBtn').innerText = "進站中...";
                document.getElementById('spinBtn').disabled = true;
            }
        }

        function animate() {
            if(state.wheelState==="SPINNING") state.angle += state.speed;
            else if(state.wheelState==="SLOWING") { 
                state.angle += state.speed; state.speed *= 0.985; 
                if(state.speed<0.002) { state.wheelState="IDLE"; finishSpin(); } 
            }
            drawWheel(); requestAnimationFrame(animate);
        }

        function drawWheel() {
            const r=150; const c=document.getElementById('wheelCanvas').getContext('2d');
            const total = STATIONS.length;
            const slice = (Math.PI * 2) / total;
            c.clearRect(0,0,300,300);
            for(let i=0; i<total; i++) {
                const s = state.angle + i*slice - Math.PI/2;
                c.beginPath(); c.moveTo(r,r); 
                c.arc(r,r,r-5,s,s+slice);
                c.fillStyle = i%2 ? "#d4a84b" : "#e8c97a"; c.fill(); c.stroke();
                // 繪製車站文字
                c.save(); c.translate(r,r); c.rotate(s + slice/2);
                c.textAlign="right"; c.fillStyle="#1a1008"; c.font="900 14px serif";
                c.fillText(STATIONS[i].name, r-25, 5); c.restore();
            }
        }

        function finishSpin() {
            const total = STATIONS.length;
            const slice = (Math.PI * 2) / total;
            // 修正：計算指針對準的區塊
            const normalized = ((-state.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const idx = Math.floor(normalized / slice) % total;
            
            state.currentStation = STATIONS[idx];
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('spinBtn').innerText = "🎲 決定目的地";
            
            // 延遲顯示，增加視覺衝擊
            setTimeout(() => {
                document.getElementById('phaseSpin').classList.add('hide');
                document.getElementById('phaseTask').classList.remove('hide');
                renderCards(); updateUI();
            }, 600);
        }

        init();
    </script>
</body>
</html>
