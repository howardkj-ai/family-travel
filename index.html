<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道冒險護照 v7.6 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #3498db; --gold: #ffd700; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 儀表板 */
        .info-panel { width: 100%; max-width: 400px; background: rgba(0,0,0,0.95); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--gold); box-sizing: border-box; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

        /* 車站卡片區 */
        .station-card { background: var(--paper); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-sizing: border-box; border-top: 8px solid var(--accent); }
        .mission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; min-height: 155px; }
        
        /* 任務卡片本體 - 強化點 */
        .card { height: 145px; perspective: 1000px; cursor: pointer; position: relative; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; pointer-events: auto; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px; text-align: center; border: 2px solid #333; }
        .card-back { background: #333; color: var(--gold); font-size: 2.2rem; border-color: var(--gold); }
        .card-front { background: white; transform: rotateY(180deg); border-color: var(--accent); }
        
        .mission-content { font-size: 0.65rem; font-weight: 900; flex: 1; display: flex; align-items: center; line-height: 1.3; margin-bottom: 5px; color: #1a1008; }
        .card-actions { width: 100%; display: flex; gap: 4px; pointer-events: auto; }
        .mini-btn { flex: 1; border: none; padding: 8px 0; border-radius: 4px; color: white; font-size: 0.65rem; font-weight: 900; cursor: pointer; font-family: inherit; }

        /* 日記收納 (手風琴效果) */
        .journal-container { width: 100%; max-width: 400px; margin-top: 30px; }
        .journal-item { background: rgba(255,255,255,0.05); color: #ddd; border-radius: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .journal-header { padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .journal-body { display: none; padding: 15px; background: var(--paper); color: #1a1008; border-top: 1px solid rgba(0,0,0,0.1); }
        .journal-item.active .journal-body { display: block; }

        .btn { padding: 15px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1.1rem; margin-bottom: 10px; font-family: inherit; }
        .btn-blue { background: var(--blue); color: white; }
        .hide { display: none !important; }
        
        /* 啟動遮罩 */
        #setupOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="setupOverlay">
        <div style="background:var(--paper); padding:30px; border-radius:15px; width:100%; max-width:320px; text-align:center; border:4px solid var(--gold);">
            <h2 style="margin-top:0">🎖️ 冒險者認證</h2>
            <input type="text" id="userNameInput" placeholder="冒險代號" style="width:100%; padding:10px; margin-bottom:10px; border:2px solid var(--accent); border-radius:5px;">
            <p style="font-size:0.7rem; color:var(--accent); margin-bottom:10px;">請輸入今年年份以解鎖系統</p>
            <input type="password" id="inviteCodeInput" placeholder="通關密語" style="width:100%; padding:10px; margin-bottom:15px; border:2px solid var(--accent); border-radius:5px;">
            <button class="btn btn-blue" onclick="unlockSystem()">進入駕駛艙</button>
        </div>
    </div>

    <div class="info-panel">
        <div class="info-row">
            <div>📅 <span id="currentDate">--/--</span></div>
            <div>
                <select id="weatherSelector" style="background:#333; color:white; border:1px solid var(--gold); border-radius:5px; padding:2px 5px;">
                    <option value="☀️ 晴朗">☀️ 晴朗</option>
                    <option value="☁️ 多雲">☁️ 多雲</option>
                    <option value="🌧️ 下雨">🌧️ 下雨</option>
                </select>
            </div>
        </div>
        <div class="info-row">
            <div>👤 <span id="displayName" style="color:var(--gold); font-weight:900;">---</span></div>
            <div>💰 <span id="totalPoints">0</span> P</div>
        </div>
    </div>

    <div id="phaseSpin">
        <div style="position:relative; margin-bottom:20px;" onclick="handleWheelClick()">
            <div style="position:absolute; top:-15px; left:50%; transform:translateX(-50%); color:var(--gold); font-size:2rem; z-index:10;">▼</div>
            <canvas id="wheelCanvas" width="300" height="300"></canvas>
        </div>
        <button id="spinBtn" class="btn btn-blue" onclick="handleWheelClick()">🎲 點擊：開始轉動</button>
    </div>

    <div id="phaseTask" class="hide">
        <div class="station-card">
            <div id="resName" style="font-size:2.8rem; font-weight:900; margin:0;">車站</div>
            <div id="resInfo" style="color:var(--accent); font-weight:900; margin-bottom:10px; font-size:0.9rem;"></div>
            
            <div id="missionArea">
                <p style="font-size:0.7rem; margin:0; opacity:0.6;">👇 翻開卡片挑戰 (每張皆可無限次洗牌)</p>
                <div class="mission-grid" id="missionGrid"></div>
            </div>

            <button onclick="generateSummary()" class="btn btn-blue" style="margin-top:10px;">🏁 撰寫遊記結算</button>
        </div>
    </div>

    <div class="journal-container">
        <h3 style="color:var(--gold); margin:0 0 15px 0;">📜 歷史冒險紀錄</h3>
        <div id="journalList"></div>
    </div>

    <div id="summaryOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:888; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--paper); width:100%; max-width:350px; padding:25px; border-radius:15px; border:4px solid var(--gold);">
            <h3 style="text-align:center; color:var(--accent); margin-top:0;">📝 遊記存檔</h3>
            <div id="sumContent" style="margin:15px 0; font-size:0.85rem; background:white; padding:15px; border-radius:8px; line-height:1.6; white-space:pre-wrap; border:1px solid #ddd; max-height:280px; overflow-y:auto;"></div>
            <button class="btn btn-blue" onclick="finalSaveToHistory()">永久存入紀錄</button>
        </div>
    </div>

    <script>
        const STATIONS = ["瑞芳","侯硐","十分","平溪","菁桐","內灣","三義","三坑"];
        const TASK_POOL = [
            {t:"拍一張車站外最吸引人的招牌", p:150, i:"📸"},
            {t:"發現車站特有的建築特色", p:120, i:"🏛️"},
            {t:"捕捉火車進站的瞬間", p:200, i:"🚆"},
            {t:"購買當地特色小吃並拍照", p:150, i:"🍱"},
            {t:"學站務員舉手禮跟站牌合照", p:100, i:"🙋"},
            {t:"錄製一段環境音(10秒)", p:120, i:"🎧"},
            {t:"找到這站最古老的設施拍下它", p:180, i:"👴"}
        ];

        let state = {
            user: localStorage.getItem('tr_user') || "",
            points: parseInt(localStorage.getItem('tr_points')) || 0,
            history: JSON.parse(localStorage.getItem('tr_history')) || [],
            currentStation: null, sessionLog: [], sessionPoints: 0,
            angle: 0, speed: 0, status: "IDLE"
        };

        function init() {
            if(state.user) document.getElementById('setupOverlay').classList.add('hide');
            const d = new Date();
            document.getElementById('currentDate').innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
            updateUI(); drawWheel(); animate();
        }

        // 安全解鎖
        function unlockSystem() {
            const n = document.getElementById('userNameInput').value.trim();
            const c = document.getElementById('inviteCodeInput').value.trim();
            const currentYear = new Date().getFullYear().toString();
            if(n && c === currentYear) {
                state.user = n; localStorage.setItem('tr_user', n);
                document.getElementById('setupOverlay').classList.add('hide');
                updateUI();
            } else { alert("請輸入正確的認證資訊！"); }
        }

        // --- 轉盤控制 ---
        function handleWheelClick() {
            if(state.status === "IDLE") {
                state.status = "SPINNING"; state.speed = 0.3;
                document.getElementById('spinBtn').innerText = "🛑 點擊：停留在這一站！";
            } else if(state.status === "SPINNING") {
                state.status = "SLOWING";
                document.getElementById('spinBtn').innerText = "進站中...";
            }
        }

        function animate() {
            if(state.status === "SPINNING") { state.angle += state.speed; }
            else if(state.status === "SLOWING") {
                state.angle += state.speed; state.speed *= 0.985;
                if(state.speed < 0.002) { state.status = "IDLE"; onSpinEnd(); }
            }
            drawWheel(); requestAnimationFrame(animate);
        }

        function drawWheel() {
            const c = document.getElementById('wheelCanvas').getContext('2d');
            const slice = (Math.PI*2) / STATIONS.length;
            c.clearRect(0,0,300,300);
            for(let i=0; i<STATIONS.length; i++){
                const s = state.angle + i*slice - Math.PI/2;
                c.beginPath(); c.moveTo(150,150); c.arc(150,150,145,s,s+slice);
                c.fillStyle = i%2 ? "#d4a84b" : "#e8c97a"; c.fill(); c.stroke();
                c.save(); c.translate(150,150); c.rotate(s + slice/2);
                c.textAlign="right"; c.fillStyle="#1a1008"; c.font="900 16px serif";
                c.fillText("❓隱藏秘境", 130, 5); c.restore();
            }
        }

        function onSpinEnd() {
            const slice = (Math.PI*2) / STATIONS.length;
            const norm = ((-state.angle % (Math.PI*2)) + (Math.PI*2)) % (Math.PI*2);
            state.currentStation = STATIONS[Math.floor(norm/slice) % STATIONS.length];
            document.getElementById('spinBtn').innerText = "🎲 點擊：開始轉動";
            setTimeout(() => {
                document.getElementById('phaseSpin').classList.add('hide');
                document.getElementById('phaseTask').classList.remove('hide');
                document.getElementById('resName').innerText = state.currentStation;
                document.getElementById('resInfo').innerText = `🚂 抵達：${state.currentStation}`;
                spawnAllMissions();
            }, 500);
        }

        // --- 任務系統核心 (重寫邏輯避免崩潰) ---
        function spawnAllMissions() {
            const grid = document.getElementById('missionGrid');
            grid.innerHTML = '';
            for(let i=0; i<3; i++) {
                grid.appendChild(createNewCardNode());
            }
        }

        function createNewCardNode() {
            const m = TASK_POOL[Math.floor(Math.random() * TASK_POOL.length)];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-back">${m.i}</div>
                    <div class="card-front">
                        <div class="mission-content">${m.t}</div>
                        <div class="card-actions">
                            <button class="mini-btn btn-done" style="background:var(--green)">✅ 完成</button>
                            <button class="mini-btn btn-skip" style="background:#888">⏭️ 跳過</button>
                        </div>
                    </div>
                </div>`;
            
            // 翻牌邏輯
            card.addEventListener('click', function(e) {
                if(!this.classList.contains('flipped')) {
                    this.classList.add('flipped');
                }
            });

            // 按鈕邏輯 - 綁定內部按鈕
            card.querySelector('.btn-done').addEventListener('click', (e) => {
                e.stopPropagation();
                processTask(m.t, m.p, card);
            });
            card.querySelector('.btn-skip').addEventListener('click', (e) => {
                e.stopPropagation();
                replaceSingleCard(card);
            });

            return card;
        }

        function processTask(title, p, oldCard) {
            const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const w = document.getElementById('weatherSelector').value;
            state.sessionPoints += p;
            state.sessionLog.push(`⏰ ${now} / ${w}\n└─ 挑戰成功：${title} (+${p}P)`);
            alert("✅ 任務已登錄！");
            replaceSingleCard(oldCard);
        }

        function replaceSingleCard(oldCard) {
            const grid = document.getElementById('missionGrid');
            const newCard = createNewCardNode();
            grid.replaceChild(newCard, oldCard);
        }

        // --- 結算與收納 ---
        function generateSummary() {
            let txt = `【冒險者日誌】\n`;
            txt += `📍 車站：${state.currentStation}\n👤 代號：${state.user}\n`;
            txt += `--------------------------\n`;
            txt += state.sessionLog.length > 0 ? state.sessionLog.join('\n\n') : "在月台上思考人生，未執行任務。";
            txt += `\n--------------------------\n💰 積分結算：+${state.sessionPoints} P`;
            document.getElementById('sumContent').innerText = txt;
            document.getElementById('summaryOverlay').style.display = 'flex';
        }

        function finalSaveToHistory() {
            state.history.unshift({
                date: new Date().toLocaleDateString(),
                station: state.currentStation,
                fullText: document.getElementById('sumContent').innerText
            });
            state.points += state.sessionPoints;
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            localStorage.setItem('tr_points', state.points);
            
            state.currentStation = null; state.sessionLog = []; state.sessionPoints = 0;
            document.getElementById('summaryOverlay').style.display = 'none';
            document.getElementById('phaseTask').classList.add('hide');
            document.getElementById('phaseSpin').classList.remove('hide');
            updateUI();
        }

        function updateUI() {
            document.getElementById('displayName').innerText = state.user || "未登錄";
            document.getElementById('totalPoints').innerText = state.points;
            const list = document.getElementById('journalList');
            list.innerHTML = state.history.map((h, i) => `
                <div class="journal-item">
                    <div class="journal-header" onclick="this.parentElement.classList.toggle('active')">
                        <span>📅 ${h.date} - ${h.station}</span>
                        <span>▼</span>
                    </div>
                    <div class="journal-body">
                        <textarea readonly style="width:100%; height:160px; font-family:inherit; padding:10px; box-sizing:border-box; border:1px solid #ccc; background:#eee;">${h.fullText}</textarea>
                        <button style="margin-top:10px; width:100%; border:none; background:#888; color:white; padding:8px; border-radius:5px;" onclick="deleteH(${i})">🗑️ 刪除紀錄</button>
                    </div>
                </div>
            `).join('') || '<div style="text-align:center; opacity:0.3; padding:20px;">無冒險歷史</div>';
        }

        function deleteH(i) {
            if(confirm("確定刪除此紀錄？")) {
                state.history.splice(i, 1);
                localStorage.setItem('tr_history', JSON.stringify(state.history));
                updateUI();
            }
        }

        init();
    </script>
</body>
</html>
