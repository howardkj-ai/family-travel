<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道大冒險 v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; overflow-x: hidden; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 1.8rem; color: var(--paper); margin: 0; letter-spacing: 0.15em; }
        
        /* Wheel Control */
        .wheel-wrap { position: relative; margin-bottom: 20px; }
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 0 4px var(--accent), 0 10px 50px rgba(0,0,0,0.8); transition: transform 0.1s linear; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; width: 30px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

        /* Buttons */
        .btn-row { display: flex; gap: 12px; margin-bottom: 20px; }
        button { padding: 15px 25px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); active { transform: scale(0.95); } }
        #actionBtn { background: linear-gradient(135deg, #d4580a, #f07a2a); color: white; min-width: 140px; }
        #actionBtn.stop { background: linear-gradient(135deg, #b52a1e, #e74c3c); }

        /* Result Card */
        #resultCard { width: 100%; max-width: 400px; background: var(--paper); border-radius: 15px; padding: 25px; box-shadow: 0 15px 45px rgba(0,0,0,0.6); display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .station-title { border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 15px; }
        .station-name { font-size: 3rem; font-weight: 900; margin: 0; line-height: 1; }
        .station-jp { font-size: 1rem; color: var(--accent); opacity: 0.7; font-weight: bold; }
        
        /* Mission System */
        .mission-area { margin-top: 20px; }
        .mission-step { background: rgba(0,0,0,0.05); border: 1px dashed rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 10px; position: relative; }
        .mission-step.locked { opacity: 0.3; filter: grayscale(1); }
        .mission-tag { font-size: 0.6rem; color: var(--accent); font-weight: 900; margin-bottom: 5px; display: block; }
        .mission-text { font-size: 1rem; font-weight: 700; }
        .next-btn { background: var(--green); color: white; font-size: 0.8rem; padding: 5px 12px; border-radius: 4px; margin-top: 10px; }

        .food-tag { display: inline-block; background: #e8c97a; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚆 鐵道大冒險</h1>
        <p style="color:var(--paper); opacity:0.5; font-size:0.7rem;">VERSION 4.0 - INTERACTIVE MODE</p>
    </div>

    <div class="wheel-wrap">
        <svg class="pointer" viewBox="0 0 28 36"><polygon points="14,34 2,4 26,4" fill="#d4580a" stroke="#2a1800" stroke-width="2"/></svg>
        <canvas id="wheelCanvas" width="320" height="320"></canvas>
    </div>

    <div class="btn-row">
        <button id="actionBtn">🎲 開始轉動</button>
    </div>

    <div id="resultCard">
        <div class="station-title">
            <div id="resName" class="station-name"></div>
            <div id="resJp" class="station-jp"></div>
            <div id="resDesc" style="font-size:0.85rem; margin-top:8px; opacity:0.8;"></div>
            <div id="resFood" class="food-tag"></div>
        </div>

        <div class="mission-area">
            <div id="m1" class="mission-step">
                <span class="mission-tag">STEP 1: 初來乍到</span>
                <span id="t1" class="mission-text"></span>
                <br><button class="next-btn" onclick="nextMission(2)">完成任務</button>
            </div>
            <div id="m2" class="mission-step locked">
                <span class="mission-tag">STEP 2: 深度探索</span>
                <span id="t2" class="mission-text">解鎖後顯示</span>
                <br><button id="b2" class="next-btn" style="display:none" onclick="nextMission(3)">完成任務</button>
            </div>
            <div id="m3" class="mission-step locked">
                <span class="mission-tag">STEP 3: 完美句點</span>
                <span id="t3" class="mission-text">解鎖後顯示</span>
                <br><button id="b3" class="next-btn" style="display:none" onclick="location.reload()">收集成功！</button>
            </div>
        </div>
    </div>

    <script>
        const STATIONS = [
            { name: "瑞芳", jp: "ルイファン", desc: "九份與平溪線的重要門戶，充滿礦業氛圍。", food: "推薦：龍鳳腿、熱油麻糬" },
            { name: "侯硐", jp: "ホウトン", desc: "著名的貓村，這裡的礦坑隧道值得一看。", food: "推薦：大麵章、古早味麵店" },
            { name: "十分", jp: "シーフェン", desc: "鐵軌就在家門口，著名的放天燈聖地。", food: "推薦：周氏蝦捲、花生捲冰淇淋" },
            { name: "礁溪", jp: "ジャオシー", desc: "一出站就能泡腳，宜蘭最方便的溫泉鄉。", food: "推薦：蔥油餅、奶凍捲" },
            { name: "福隆", jp: "フロン", desc: "最經典的鐵路便當與金黃色沙灘。", food: "推薦：正宗福隆便當、石花凍" }
            // ... 可再自行增加車站
        ];

        const MISSION_POOL = {
            step1: ["找出車站的站牌並全家合照 📸", "在車站大廳找出這站的歷史看板 📖", "詢問站務員這站最有名的地標 🚉"],
            step2: ["找出巷弄內的三家特色小店 🏚️", "觀察這站建築物最古老的部分 🏠", "找一條沒走過的小路探索 🛤️"],
            step3: ["買一樣當地特色的伴手禮 🛍️", "寫下一句今天最想記住的話 ✍️", "全家票選今天最美的風景瞬間 🌅"]
        };

        let angle = 0;
        let speed = 0;
        let state = "IDLE"; // IDLE, SPINNING, SLOWING
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const actionBtn = document.getElementById('actionBtn');

        function draw() {
            const r = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const slice = (Math.PI * 2) / STATIONS.length;

            STATIONS.forEach((st, i) => {
                const start = angle + i * slice - Math.PI/2;
                ctx.beginPath();
                ctx.moveTo(r, r);
                ctx.arc(r, r, r - 5, start, start + slice);
                ctx.fillStyle = i % 2 ? "#e8c97a" : "#d4a84b";
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(r, r);
                ctx.rotate(start + slice/2 + Math.PI/2);
                ctx.fillStyle = "#1a1008";
                ctx.font = "bold 16px serif";
                ctx.textAlign = "center";
                ctx.fillText(st.name, 0, -r * 0.7);
                ctx.restore();
            });
        }

        function update() {
            if (state === "SPINNING") {
                angle += speed;
            } else if (state === "SLOWING") {
                speed *= 0.985;
                angle += speed;
                if (speed < 0.002) {
                    state = "IDLE";
                    finishSpin();
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        actionBtn.onclick = () => {
            if (state === "IDLE") {
                state = "SPINNING";
                speed = 0.15 + Math.random() * 0.1;
                actionBtn.innerText = "🛑 停！";
                actionBtn.classList.add("stop");
                document.getElementById('resultCard').style.display = 'none';
            } else if (state === "SPINNING") {
                state = "SLOWING";
                actionBtn.style.display = "none";
            }
        };

        function finishSpin() {
            const stopAngle = ((-angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const idx = Math.floor(stopAngle / ((Math.PI * 2) / STATIONS.length));
            const st = STATIONS[idx];

            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resName').innerText = st.name;
            document.getElementById('resJp').innerText = st.jp;
            document.getElementById('resDesc').innerText = st.desc;
            document.getElementById('resFood').innerText = st.food;
            
            // 初始化任務
            document.getElementById('t1').innerText = MISSION_POOL.step1[Math.floor(Math.random()*MISSION_POOL.step1.length)];
            window.currentSt = st;
        }

        window.nextMission = (step) => {
            if(step === 2) {
                document.getElementById('m2').classList.remove('locked');
                document.getElementById('t2').innerText = MISSION_POOL.step2[Math.floor(Math.random()*MISSION_POOL.step2.length)];
                document.getElementById('b2').style.display = "inline-block";
            } else if(step === 3) {
                document.getElementById('m3').classList.remove('locked');
                document.getElementById('t3').innerText = MISSION_POOL.step3[Math.floor(Math.random()*MISSION_POOL.step3.length)];
                document.getElementById('b3').style.display = "inline-block";
            }
        };

        update();
    </script>
</body>
</html>
