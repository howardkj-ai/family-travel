<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚆 鐵道任務局 v10</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Zen+Antique&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0b07; --paper:#f7eed8; --ink:#1a1008;
  --gold:#c8960a; --gl:#f0c840;
  --nav:#1a4a8a; --sup:#8a1a1a;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--paper);font-family:'Noto Serif TC',serif;min-height:100vh;padding-bottom:70px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.012) 40px),
  repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.012) 40px);}

/* HEADER */
.hdr{position:relative;z-index:10;padding:16px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(200,150,10,.18);background:linear-gradient(180deg,#1a1208 0%,transparent 100%);}
.htitle{font-family:'Zen Antique',serif;font-size:.95rem;color:var(--gold);letter-spacing:.18em;}
.hsub{font-size:.57rem;opacity:.38;letter-spacing:.13em;margin-top:2px;}
.hright{text-align:right;cursor:pointer;}
.hpts{color:var(--gl);font-size:1.1rem;font-weight:900;}
.hmeta{font-size:.57rem;opacity:.45;margin-top:2px;}
.htitle-badge{font-size:.52rem;color:var(--gl);opacity:.8;margin-top:1px;letter-spacing:.05em;}

/* MAIN */
.main{position:relative;z-index:1;padding:0 14px;max-width:440px;margin:0 auto;}

/* OVERLAY BASE */
.ov{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(10,8,4,.97);}
.ov.off{display:none;}
.obox{background:var(--paper);color:var(--ink);padding:26px 20px;border-radius:var(--r);width:100%;max-width:330px;border:3px solid var(--gold);box-shadow:0 0 50px rgba(200,150,10,.3);max-height:90vh;overflow-y:auto;}
.obox h2{font-family:'Zen Antique',serif;font-size:1.15rem;text-align:center;margin-bottom:4px;}
.obox p{font-size:.65rem;text-align:center;opacity:.58;margin-bottom:16px;}
.inp{width:100%;padding:9px 12px;margin-bottom:9px;border:2px solid #ccc;border-radius:8px;font-family:'Noto Serif TC',serif;font-size:.88rem;background:#fafafa;}
.inp:focus{outline:none;border-color:var(--gold);}
.flabel{font-size:.6rem;opacity:.5;letter-spacing:.12em;margin-bottom:6px;}

/* MODE BTNS */
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mode-btn{padding:11px 8px;border-radius:10px;cursor:pointer;border:2px solid #ccc;text-align:center;font-family:'Noto Serif TC',serif;font-size:.75rem;font-weight:900;background:#f0e8d0;color:var(--ink);transition:all .15s;}
.mode-btn.sel{background:var(--ink);color:var(--gl);border-color:var(--gold);}
.mode-icon{font-size:1.3rem;display:block;margin-bottom:3px;}

/* ROLE CARDS */
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.rcard{padding:12px 9px;border-radius:10px;cursor:pointer;border:2px solid transparent;text-align:center;transition:all .18s;}
.rcard.nav-c{background:linear-gradient(135deg,#0d2a5a,#1a4a8a);border-color:#2a6aaa;}
.rcard.sup-c{background:linear-gradient(135deg,#5a0d0d,#8a1a1a);border-color:#aa2a2a;}
.rcard.sel-nav{box-shadow:0 0 16px rgba(26,74,138,.9),0 0 0 2px #4a8adf;border-color:#4a8adf;transform:scale(1.04);}
.rcard.sel-sup{box-shadow:0 0 16px rgba(138,26,26,.9),0 0 0 2px #df4a4a;border-color:#df4a4a;transform:scale(1.04);}
.rcard-icon{font-size:1.6rem;margin-bottom:3px;}
.rcard-name{font-weight:900;font-size:.75rem;}
.rcard-desc{font-size:.55rem;opacity:.7;line-height:1.4;margin-top:2px;}

/* BUTTONS */
.btn{width:100%;padding:12px;border:none;border-radius:50px;font-weight:900;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:.9rem;transition:all .15s;letter-spacing:.04em;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gl));color:var(--ink);box-shadow:0 4px 16px rgba(200,150,10,.4);}
.btn-gold:active{transform:scale(.97);}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--paper);border:1px solid rgba(255,255,255,.15);}
.btn-sm{padding:7px 12px;border:none;border-radius:24px;font-family:'Noto Serif TC',serif;font-weight:900;font-size:.67rem;cursor:pointer;transition:all .15s;}
.btn-row{display:flex;gap:7px;margin-top:8px;}

/* WHEEL */
#phaseSpin{padding-top:8px;}
.wheel-wrap{display:flex;flex-direction:column;align-items:center;margin:16px 0;}
.wheel-ptr{color:var(--gl);font-size:1.9rem;margin-bottom:-7px;z-index:5;filter:drop-shadow(0 0 7px rgba(240,200,64,.6));animation:ptrP 2s ease-in-out infinite;}
@keyframes ptrP{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#wCanvas{border-radius:50%;box-shadow:0 0 0 4px rgba(200,150,10,.22),0 0 36px rgba(200,150,10,.1),0 16px 48px rgba(0,0,0,.8);cursor:pointer;touch-action:none;}
.spin-hint{font-size:.58rem;opacity:.32;text-align:center;margin-top:7px;letter-spacing:.1em;}

/* STATION HERO */
.st-hero{text-align:center;padding:20px 14px 12px;background:linear-gradient(180deg,rgba(200,150,10,.1) 0%,transparent 100%);border-radius:var(--r) var(--r) 0 0;border:1px solid rgba(200,150,10,.2);border-bottom:none;}
.sname{font-family:'Zen Antique',serif;font-size:3rem;font-weight:900;color:var(--gl);text-shadow:0 0 36px rgba(240,200,64,.4);line-height:1;}
.sname.myst{filter:blur(6px);transition:filter .6s;}
.ssub{font-size:.62rem;opacity:.42;margin-top:5px;letter-spacing:.18em;}

/* WEATHER BAR */
.wx-bar{display:flex;align-items:center;gap:7px;padding:7px 12px;margin-bottom:9px;background:rgba(255,255,255,.04);border-radius:9px;border:1px solid rgba(255,255,255,.07);font-size:.68rem;}
.wx-sel{background:rgba(255,255,255,.08);color:var(--paper);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:3px 6px;font-size:.65rem;font-family:'Noto Serif TC',serif;}
.wx-time{margin-left:auto;font-size:.6rem;opacity:.4;}

/* STAMINA */
.sta-row{display:flex;align-items:center;gap:5px;font-size:.62rem;padding:8px 12px 0;color:var(--gold);}
.heart{font-size:.88rem;transition:all .2s;}
.heart.lost{opacity:.18;filter:grayscale(1);}

/* PANELS */
.panels-wrap{border:1px solid rgba(200,150,10,.14);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.panel-single{padding:13px 11px;background:rgba(255,255,255,.02);}
.panel-duo{display:grid;grid-template-columns:1fr 1fr;}
.p-nav{padding:13px 10px;background:linear-gradient(180deg,rgba(26,74,138,.22) 0%,rgba(26,74,138,.08) 100%);border-left:3px solid #2a6aaa;}
.p-sup{padding:13px 10px;background:linear-gradient(180deg,rgba(138,26,26,.22) 0%,rgba(138,26,26,.08) 100%);border-right:3px solid #aa2a2a;}
.ph{display:flex;align-items:center;gap:5px;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.07);}
.ph-icon{font-size:.95rem;}
.ph-title{font-size:.62rem;font-weight:900;letter-spacing:.07em;}
.ph-sub{font-size:.5rem;opacity:.42;}

/* FLIP CARD */
.cw{margin-bottom:8px;perspective:700px;}
.core-badge{display:inline-block;font-size:.48rem;font-weight:900;letter-spacing:.07em;padding:1px 5px;border-radius:7px;margin-bottom:4px;background:rgba(200,150,10,.22);color:var(--gl);border:1px solid rgba(200,150,10,.28);}
.fc{width:100%;height:126px;position:relative;transform-style:preserve-3d;transition:transform .52s cubic-bezier(.4,0,.2,1);}
.fc.flip{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:9px;overflow:hidden;}
.fb{background:linear-gradient(135deg,#1a1208,#2a1e0a);border:2px solid rgba(200,150,10,.32);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;user-select:none;}
.fb:active{cursor:grabbing;}
.fb .ce{font-size:2.4rem;}
.fb .ch{font-size:.52rem;opacity:.28;margin-top:5px;letter-spacing:.07em;}
.swdots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:3px;}
.sd{width:16px;height:2px;border-radius:2px;background:rgba(200,150,10,.35);}
.sd.on{background:var(--gl);}
.ff{transform:rotateY(180deg);background:#fff;border:2px solid rgba(200,150,10,.45);display:flex;flex-direction:column;padding:8px;}
.ff.done-c{background:#e8f5e9;border-color:rgba(46,125,50,.45);}
.tt{font-size:.58rem;line-height:1.43;color:var(--ink);flex:1;margin-bottom:4px;}
.tp{font-size:.56rem;color:#c8690a;font-weight:900;margin-bottom:4px;}
.tacts{display:flex;gap:3px;}
.ta-ok{flex:2;background:#2e7d32;color:#fff;}
.ta-ok:active{background:#1b5e20;}
.ta-sk{flex:1;background:#888;color:#fff;}
.ta-sk:active{background:#555;}
.done-st{text-align:center;font-size:.6rem;color:#2e7d32;font-weight:900;padding-top:3px;}

/* PROGRESS */
.prog-box{margin:12px 0;padding:12px 14px;background:rgba(200,150,10,.06);border:1px solid rgba(200,150,10,.16);border-radius:var(--r);}
.pb-lbl{font-size:.58rem;opacity:.42;letter-spacing:.13em;margin-bottom:6px;}
.pb-track{background:rgba(255,255,255,.07);border-radius:20px;height:8px;overflow:hidden;}
.pb-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--gold),var(--gl));transition:width .6s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 9px rgba(240,200,64,.38);}
.pb-stats{display:flex;justify-content:space-between;margin-top:5px;font-size:.57rem;opacity:.52;}

/* ACT ROW */
.act-row{display:flex;gap:7px;margin-top:12px;}

/* SUMMARY */
#sumOv{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:888;display:none;align-items:center;justify-content:center;padding:16px;}
.sum-box{background:var(--paper);color:var(--ink);width:100%;max-width:355px;padding:20px;border-radius:var(--r);border:3px solid var(--gold);box-shadow:0 0 50px rgba(200,150,10,.4);max-height:90vh;overflow-y:auto;}
.sum-title{font-family:'Zen Antique',serif;font-size:1.05rem;text-align:center;margin-bottom:8px;}
.sum-stars{text-align:center;font-size:1.7rem;margin-bottom:9px;letter-spacing:.14em;}
.sum-content{white-space:pre-wrap;font-size:.69rem;line-height:1.75;background:#f0e8d0;padding:12px;border-radius:8px;max-height:230px;overflow-y:auto;border:1px solid #ddd;margin-bottom:11px;font-family:monospace;}

/* ACHIEVEMENTS */
#achOv{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:888;display:none;align-items:center;justify-content:center;padding:16px;}
.ach-box{background:var(--paper);color:var(--ink);width:100%;max-width:355px;padding:20px;border-radius:var(--r);border:3px solid var(--gold);max-height:85vh;overflow-y:auto;}
.ach-title{font-family:'Zen Antique',serif;font-size:1.1rem;text-align:center;margin-bottom:14px;}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.ach-card{border-radius:9px;padding:11px 9px;text-align:center;border:2px solid;}
.ach-card.unlocked{background:#fff8e8;border-color:var(--gold);}
.ach-card.locked{background:#f0eade;border-color:#ccc;opacity:.55;}
.ach-icon{font-size:1.8rem;margin-bottom:4px;}
.ach-name{font-size:.65rem;font-weight:900;margin-bottom:2px;}
.ach-cond{font-size:.52rem;opacity:.6;line-height:1.35;}
.ach-status{font-size:.55rem;margin-top:4px;font-weight:900;}
.ach-card.unlocked .ach-status{color:#c8690a;}
.ach-card.locked .ach-status{color:#999;}

/* JOURNAL */
.j-sec{margin-top:26px;}
.sec-t{font-family:'Zen Antique',serif;color:var(--gold);font-size:.82rem;letter-spacing:.18em;margin-bottom:11px;}
.ji{background:rgba(255,255,255,.04);border-radius:10px;margin-bottom:7px;overflow:hidden;border:1px solid rgba(255,255,255,.05);}
.jh{padding:10px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.72rem;}
.jh:hover{background:rgba(255,255,255,.04);}
.jm{font-size:.54rem;opacity:.38;margin-top:2px;}
.jchev{opacity:.32;transition:transform .2s;font-size:.8rem;}
.ji.open .jchev{transform:rotate(180deg);}
.jb{display:none;padding:11px 13px;border-top:1px solid rgba(255,255,255,.05);}
.ji.open .jb{display:block;}
.jtxt{width:100%;height:125px;background:rgba(255,255,255,.04);color:var(--paper);font-family:monospace;font-size:.6rem;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px;resize:none;}
.jdel{margin-top:7px;width:100%;padding:6px;border:none;background:rgba(200,50,50,.18);color:#ff8080;border-radius:5px;font-size:.6rem;cursor:pointer;font-family:'Noto Serif TC',serif;}

/* PTS POP */
.pp{position:fixed;pointer-events:none;z-index:9999;font-size:1.25rem;font-weight:900;color:var(--gl);text-shadow:0 0 9px rgba(240,200,64,.8);animation:ppop 1.1s ease-out forwards;}
@keyframes ppop{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-52px) scale(1.28)}100%{opacity:0;transform:translateY(-90px) scale(.8)}}

/* UNLOCK TOAST */
.ach-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),var(--gl));color:var(--ink);padding:10px 20px;border-radius:30px;font-size:.78rem;font-weight:900;z-index:9998;white-space:nowrap;box-shadow:0 4px 20px rgba(200,150,10,.5);animation:toastIn .4s ease-out;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.off{display:none!important;}
footer{text-align:center;font-size:.55rem;opacity:.16;padding:16px;letter-spacing:.09em;}
</style>
</head>
<body>

<!-- ══ SETUP OVERLAY ══ -->
<div class="ov" id="setupOv">
  <div class="obox">
    <h2>🎖️ 任務局登記</h2>
    <p>設定代號 · 選模式 · 輸密語</p>

    <div class="flabel">▸ 遊玩模式</div>
    <div class="mode-row">
      <div class="mode-btn" id="modeSolo" onclick="setMode('solo')"><span class="mode-icon">🧍</span>單人模式</div>
      <div class="mode-btn" id="modeDuo"  onclick="setMode('duo')"><span class="mode-icon">👫</span>雙人模式</div>
    </div>

    <input class="inp" id="uName"  placeholder="你的代號（可改名）" type="text">
    <input class="inp" id="uName2" placeholder="同伴代號" type="text">
    <input class="inp" id="uCode"  placeholder="任務密語" type="password">

    <div id="roleSection">
      <div class="flabel">▸ 你的角色</div>
      <div class="role-row">
        <div class="rcard nav-c" id="rNav" onclick="setRole('nav')">
          <div class="rcard-icon">🧭</div>
          <div class="rcard-name" style="color:#7ab4ff">導航長</div>
          <div class="rcard-desc">建築・路線・隱藏細節</div>
        </div>
        <div class="rcard sup-c" id="rSup" onclick="setRole('sup')">
          <div class="rcard-icon">🍱</div>
          <div class="rcard-name" style="color:#ff9a9a">補給官</div>
          <div class="rcard-desc">美食・互動・收集情報</div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-gold" onclick="doUnlock()">啟動任務</button>
      <button class="btn btn-ghost off" id="closeSetup" onclick="closeSetupOv()" style="width:auto;padding:12px 16px;">✕</button>
    </div>
  </div>
</div>

<!-- ══ ACHIEVEMENTS OVERLAY ══ -->
<div id="achOv">
  <div class="ach-box">
    <div class="ach-title">🏅 稱號成就</div>
    <div class="ach-grid" id="achGrid"></div>
    <button class="btn btn-ghost" onclick="document.getElementById('achOv').style.display='none'">關閉</button>
  </div>
</div>

<!-- ══ HEADER ══ -->
<div class="hdr">
  <div onclick="toggleSetupOv()" style="cursor:pointer">
    <div class="htitle">鐵道任務局</div>
    <div class="hsub">RAILWAY MISSION BUREAU v10</div>
    <div class="htitle-badge" id="hTitle">── 初心探索者 ──</div>
  </div>
  <div class="hright">
    <div class="hpts" onclick="openAch()" style="cursor:pointer">🏅 <span id="hPts">0</span>P</div>
    <div class="hmeta"><span id="hRole">---</span> ｜ LV.<span id="hLv">1</span></div>
    <div class="hmeta" id="hName" style="color:var(--gl)">---</div>
  </div>
</div>

<div class="main">

  <!-- ══ WHEEL ══ -->
  <div id="phaseSpin">
    <div class="wheel-wrap">
      <div class="wheel-ptr">▼</div>
      <canvas id="wCanvas" width="270" height="270" onclick="handleWheel()"></canvas>
      <div class="spin-hint">點擊轉動 → 再點停止 → 揭曉秘境</div>
    </div>
    <button class="btn btn-gold" id="spinBtn" onclick="handleWheel()">🎲 開始抽籤</button>
  </div>

  <!-- ══ TASK PHASE ══ -->
  <div id="phaseTask" class="off">

    <div class="wx-bar">
      <span>🌤</span>
      <select class="wx-sel" id="wxSel">
        <option>☀️ 晴朗</option><option>☁️ 多雲</option>
        <option>🌦️ 短暫雨</option><option>🌧️ 下雨</option><option>🌫️ 起霧</option>
      </select>
      <span class="wx-time" id="wxTime">--:--</span>
    </div>

    <div class="st-hero">
      <div class="sname myst" id="sName">❓</div>
      <div class="ssub" id="sSub">▸ 左右滑動任務牌揭曉目的地</div>
    </div>

    <div style="padding:8px 11px 0;">
      <div class="sta-row">
        <span style="font-size:.57rem;opacity:.45;letter-spacing:.09em;">體力</span>
        <span class="heart" id="h1">❤️</span>
        <span class="heart" id="h2">❤️</span>
        <span class="heart" id="h3">❤️</span>
        <span style="margin-left:auto;font-size:.55rem;opacity:.38;">跳過 -50P &amp; -1心</span>
      </div>
    </div>

    <div class="panels-wrap" id="panelsWrap"></div>

    <div class="prog-box">
      <div class="pb-lbl">▸ 任務進度</div>
      <div class="pb-track"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
      <div class="pb-stats"><span id="pbDone">0/0</span><span id="pbPts">+0P</span></div>
    </div>

    <div class="act-row">
      <button class="btn btn-ghost" id="rerollBtn" style="flex:1;font-size:.75rem;">🔄 重抽任務</button>
      <button class="btn btn-gold"  onclick="openSummary()" style="flex:2;">🏁 結算存檔</button>
    </div>
  </div>

  <!-- ══ JOURNAL ══ -->
  <div class="j-sec">
    <div class="sec-t">📜 冒險紀錄</div>
    <div id="jList"></div>
  </div>

</div>

<!-- ══ SUMMARY OVERLAY ══ -->
<div id="sumOv">
  <div class="sum-box">
    <div class="sum-title">📝 任務完結報告</div>
    <div class="sum-stars" id="sumStars">⭐⭐⭐</div>
    <div class="sum-content" id="sumContent"></div>
    <button class="btn btn-sm" style="width:100%;background:#555;color:#fff;margin-bottom:8px;" onclick="copyLog()">📋 複製遊記</button>
    <button class="btn btn-gold" onclick="saveHistory()">存入紀錄 ＆ 返回</button>
    <button class="btn btn-ghost" style="margin-top:7px;font-size:.75rem;" onclick="document.getElementById('sumOv').style.display='none'">繼續探索</button>
  </div>
</div>

<footer>v10.0 ｜ 鐵道任務局 ｜ © 2026</footer>

<script>
// ════════════════════════════════
//  DATA
// ════════════════════════════════
const STATIONS = ["瑞芳","侯硐","十分","平溪","菁桐","內灣","三義","三坑","集集","車埕","竹田","保安"];

const CORE = {
  "瑞芳": {t:"找到九份老街第一盞油燈或紅燈籠並拍照",p:200,i:"🏮"},
  "侯硐": {t:"找到侯硐的貓並合影（需獲貓同意）",p:200,i:"🐱"},
  "十分": {t:"捕捉天燈在空中飛翔的瞬間",p:220,i:"🪔"},
  "平溪": {t:"找到平溪老街石板路踩上去拍腳底照",p:180,i:"🪨"},

function checkAchievements() {
  let newUnlocks = [];
  ACHIEVEMENTS.forEach(a => {
    if (!S.unlockedAch.includes(a.id) && a.check(S)) {
      S.unlockedAch.push(a.id);
      newUnlocks.push(a);
    }
  });
  if (newUnlocks.length > 0) {
    showAchToast(newUnlocks[0]);
  }
  saveStats();
  updateHeader();
}

function showAchToast(a) {
  const el = document.createElement('div');
  el.className = 'ach-toast';
  el.innerHTML = `${a.icon} 解鎖稱號：${a.name}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function getCurrentTitle() {
  // 取最後解鎖的稱號
  for (let i = ACHIEVEMENTS.length - 1; i >= 0; i--) {
    if (S.unlockedAch.includes(ACHIEVEMENTS[i].id)) return ACHIEVEMENTS[i].name;

function doUnlock() {
  const n  = document.getElementById('uName').value.trim();
  const n2 = document.getElementById('uName2').value.trim();
  const c  = document.getElementById('uCode').value.trim();
  if (!n)          { alert("請輸入代號"); return; }

//  WHEEL
// ════════════════════════════════
function handleWheel() {
  if (!S.user) { openSetupOv(); return; }
  if (S.wst==="IDLE") {
    S.wst="SPINNING"; S.speed=0.24+Math.random()*.14;
    document.getElementById('spinBtn').innerText="🛑 停止！";
  } else if (S.wst==="SPINNING") {
    S.wst="SLOWING";
    document.getElementById('spinBtn').innerText="進站中...";
  }
}
function animLoop() {
  if (S.wst==="SPINNING") S.angle+=S.speed;
  else if (S.wst==="SLOWING") {
    S.angle+=S.speed; S.speed*=.982;
    if (S.speed<.0018) { S.wst="IDLE"; onSpinEnd(); }
  }
  drawWheel();
  requestAnimationFrame(animLoop);
}
function drawWheel() {
  const cv=document.getElementById('wCanvas'), ctx=cv.getContext('2d');
  const W=cv.width, C=W/2, R=C-4, sl=Math.PI*2/STATIONS.length;
  ctx.clearRect(0,0,W,W);
  for (let i=0;i<STATIONS.length;i++) {
    const s=S.angle+i*sl-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(C,C); ctx.arc(C,C,R,s,s+sl);
    ctx.fillStyle=i%2?"#c8860a":"#e8b040"; ctx.fill();
    ctx.strokeStyle="rgba(10,8,4,.4)"; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.translate(C,C); ctx.rotate(s+sl/2);
    ctx.textAlign="right"; ctx.fillStyle=i%2?"#fff8e0":"#1a0c00";
    ctx.font="900 12px 'Noto Serif TC',serif";
    ctx.fillText("❓秘境",R-9,5); ctx.restore();
  }
  ctx.beginPath(); ctx.arc(C,C,19,0,Math.PI*2);
  ctx.fillStyle="#0e0b07"; ctx.fill();
  ctx.strokeStyle="rgba(200,150,10,.5)"; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle="#c8960a"; ctx.font="900 13px serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("局",C,C); ctx.textBaseline="alphabetic";
}
function onSpinEnd() {
  const sl=Math.PI*2/STATIONS.length;
  const norm=((-S.angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
  S.station=STATIONS[Math.floor(norm/sl)%STATIONS.length];
  document.getElementById('spinBtn').innerText="🎲 開始抽籤";
  setTimeout(()=>{
    document.getElementById('phaseSpin').classList.add('off');
    document.getElementById('phaseTask').classList.remove('off');
    document.getElementById('sName').innerText="❓";
    document.getElementById('sName').classList.add('myst');
    document.getElementById('sSub').innerText="▸ 左右滑動任務牌揭曉目的地";
    S.revealed=false; S.stamina=3; S.sessionPts=0; S.log=[];
    S.arriveTime=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('wxTime').innerText="抵達 "+S.arriveTime;
    renderStamina(); buildTasks();
  },400);
}

const shuffle = a => [...a].sort(()=>Math.random()-.5);

function buildTasks() {
  const core=CORE[S.station]||{t:`探索${S.station}站最有特色的地方並拍照`,p:200,i:"⭐"};
  if (S.mode==='solo') {
    const np=shuffle(NAV_POOL).slice(0,2), sp=shuffle(SUP_POOL).slice(0,2);
    S.tasks=[
      {id:'c0',type:'solo',core:true, task:{...core}},
      {id:'n0',type:'solo',core:false,task:{...np[0]}},
      {id:'n1',type:'solo',core:false,task:{...np[1]}},
      {id:'s0',type:'solo',core:false,task:{...sp[0]}},
      {id:'s1',type:'solo',core:false,task:{...sp[1]}},
    ].map(t=>({...t,done:false}));
  } else {
    const np=shuffle(NAV_POOL).slice(0,2), sp=shuffle(SUP_POOL).slice(0,2);
    S.tasks=[
      {id:'nc',type:'nav',core:true, task:{...core}},
      {id:'n0',type:'nav',core:false,task:{...np[0]}},
      {id:'n1',type:'nav',core:false,task:{...np[1]}},
      {id:'sc',type:'sup',core:true, task:{...core}},
      {id:'s0',type:'sup',core:false,task:{...sp[0]}},
      {id:'s1',type:'sup',core:false,task:{...sp[1]}},
    ].map(t=>({...t,done:false}));
  }
  renderPanels(); updateProgress();
}

function renderPanels() {
  const wrap=document.getElementById('panelsWrap');
  if (S.mode==='solo') {
    wrap.innerHTML=`<div class="panel-single">${S.tasks.map(t=>cardHTML(t)).join('')}</div>`;
  } else {
    const navT=S.tasks.filter(t=>t.type==='nav');
    const supT=S.tasks.filter(t=>t.type==='sup');
    const navName=S.role==='nav'?S.user:S.user2;
    const supName=S.role==='sup'?S.user:S.user2;
    wrap.innerHTML=`<div class="panel-duo">
      <div class="p-nav">
        <div class="ph"><span class="ph-icon">🧭</span><div><div class="ph-title" style="color:#7ab4ff">導航長</div><div class="ph-sub">${navName}</div></div></div>
        ${navT.map(t=>cardHTML(t)).join('')}
      </div>
      <div class="p-sup">
        <div class="ph"><span class="ph-icon">🍱</span><div><div class="ph-title" style="color:#ff9a9a">補給官</div><div class="ph-sub">${supName}</div></div></div>
        ${supT.map(t=>cardHTML(t)).join('')}
      </div>
    </div>`;
  }
  attachSwipe();
}

function cardHTML(t) {
  if (t.done) return `
    <div class="cw"><div class="fc flip" id="fc-${t.id}">
      <div class="face fb"><div class="ce">${t.task.i}</div></div>
      <div class="face ff done-c">
        ${t.core?'<span class="core-badge">⭐ 核心任務</span>':''}
        <div class="tt">${t.task.t}</div>
        <div class="tp">+${t.task.p}P</div>
        <div class="done-st">✓ 完成</div>
      </div>
    </div></div>`;
  return `
    <div class="cw"><div class="fc" id="fc-${t.id}">
      <div class="face fb">
        <div class="ce">${t.task.i}</div>
        <div class="ch">← 滑動揭開任務 →</div>
        <div class="swdots"><div class="sd on"></div><div class="sd"></div><div class="sd"></div></div>
      </div>
      <div class="face ff">
        ${t.core?'<span class="core-badge">⭐ 核心任務</span>':''}
        <div class="tt">${t.task.t}</div>
        <div class="tp">+${t.task.p}P</div>
        <div class="tacts">
          <button class="btn-sm ta-ok" data-id="${t.id}">✅ 完成</button>
          <button class="btn-sm ta-sk" data-id="${t.id}">⏭ 跳過</button>
        </div>
      </div>
    </div></div>`;
}

// 用 event delegation 避免 github pages 的 inline onclick 問題
document.addEventListener('click', function(e) {
  const ok = e.target.closest('.ta-ok');
  const sk = e.target.closest('.ta-sk');
  if (ok) { e.stopPropagation(); doneTask(ok.dataset.id, e); }
  if (sk) { e.stopPropagation(); skipTask(sk.dataset.id, e); }
});

function attachSwipe() {
  document.querySelectorAll('.fc:not(.flip)').forEach(card => {
    let sx=0, sy=0, moved=false;
    const start = e => { const t=e.touches?e.touches[0]:e; sx=t.clientX; sy=t.clientY; moved=false; };
    const move  = e => {
      const t=e.touches?e.touches[0]:e;
      const dx=t.clientX-sx, dy=t.clientY-sy;
      if (Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>18) { moved=true; if(e.cancelable)e.preventDefault(); }
    };
    const end = e => {
      const t=e.changedTouches?e.changedTouches[0]:e;
      if (moved && Math.abs(t.clientX-sx)>38) { card.classList.add('flip'); revealStation(); }
    };
    card.addEventListener('touchstart',start,{passive:true});
    card.addEventListener('touchmove', move, {passive:false});
    card.addEventListener('touchend',  end);
    card.addEventListener('mousedown', start);
    card.addEventListener('mousemove', e=>{if(e.buttons)move(e);});
    card.addEventListener('mouseup',   end);
  });
}

function revealStation() {
  if (S.revealed) return;
  S.revealed=true;
  const el=document.getElementById('sName');
  el.innerText=S.station; el.classList.remove('myst');
  document.getElementById('sSub').innerText=`🚂 抵達：${S.station}站`;
}

function doneTask(id, e) {
  const task=S.tasks.find(t=>t.id===id);
  if (!task||task.done) return;
  task.done=true;
  S.sessionPts+=task.task.p;
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const w=document.getElementById('wxSel').value;
  S.log.push({time:now,weather:w,action:"完成",desc:task.task.t,pts:task.task.p});
  renderPanels(); updateProgress(); showPop('+'+task.task.p+'P',e);
}

function skipTask(id, e) {
  if (S.stamina<=0) { alert("體力耗盡！無法再跳過。"); return; }
  const task=S.tasks.find(t=>t.id===id);
  if (!task||task.done) return;
  const cost=task.core?100:50;
  S.sessionPts=Math.max(0,S.sessionPts-cost);
  S.stamina--;
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const w=document.getElementById('wxSel').value;
  S.log.push({time:now,weather:w,action:"跳過",desc:task.task.t,pts:-cost});
  // 換新任務
  const pool=(task.type==='nav'||task.id.startsWith('n'))?NAV_POOL:SUP_POOL;
  const used=S.tasks.map(t=>t.task.t);
  const avail=pool.filter(p=>!used.includes(p.t));
  if (avail.length>0) { task.task={...avail[Math.floor(Math.random()*avail.length)]}; task.core=false; }
  task.done=false;
  renderStamina(); renderPanels(); updateProgress(); showPop('-'+cost+'P',e);
}

function renderStamina() {
  [1,2,3].forEach(i=>document.getElementById('h'+i).classList.toggle('lost',i>S.stamina));
}

function updateProgress() {
  const total=S.tasks.length, done=S.tasks.filter(t=>t.done).length;
  document.getElementById('pbFill').style.width=(total>0?done/total*100:0)+'%';
  document.getElementById('pbDone').innerText=`${done} / ${total} 完成`;
  document.getElementById('pbPts').innerText=`本次 +${S.sessionPts}P`;
  updateHeader();
}

function openSummary() {
  const total=S.tasks.length, done=S.tasks.filter(t=>t.done).length, rate=total>0?done/total:0;
  document.getElementById('sumStars').innerText=rate>=.8?"⭐⭐⭐":rate>=.5?"⭐⭐":"⭐";
  document.getElementById('sumContent').innerText=buildLog();
  document.getElementById('sumOv').style.display='flex';
}

function buildLog() {
  const d=new Date();
  const dateStr=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  const w=S.log.length>0?S.log[S.log.length-1].weather:"未記錄";
  const modeLabel=S.mode==='solo'?'單人':(`雙人（${S.user}・${S.user2}）`);
  const roleLabel=S.mode==='duo'?(S.role==='nav'?'導航長':'補給官'):'';
  const total=S.tasks.length, done=S.tasks.filter(t=>t.done).length;
  const rate=total>0?Math.round(done/total*100):0;

  let txt='';
  txt+=`【鐵道冒險日誌】\n`;
  txt+=`日期：${dateStr}\n`;
  txt+=`目的地：${S.station||'未揭曉'}站\n`;
  txt+=`探險者：${S.user}${S.mode==='duo'?` & ${S.user2}`:''}`;
  if (roleLabel) txt+=`（${roleLabel}）`;
  txt+=`\n模式：${modeLabel}\n`;
  txt+=`${'─'.repeat(22)}\n\n`;

  if (S.log.length>0) {
    txt+=`▸ 任務紀錄\n`;
    S.log.forEach(l=>{
      const mark=l.action==='完成'?'✓':'✗';
      // 時間天氣一行，任務另一行
      txt+=`${mark} ${l.time}  ${l.weather}\n`;
      txt+=`   ${l.desc}\n`;
      txt+=`   ${l.action==='完成'?'+':''}${l.pts}P\n\n`;
    });
  } else {
    txt+=`在月台靜靜感受風的流動。\n\n`;
  }

  txt+=`${'─'.repeat(22)}\n`;
  txt+=`完成率：${rate}%（${done}/${total}）\n`;
  txt+=`體力：${S.stamina}/3 心剩餘\n`;
  txt+=`本次積分：+${S.sessionPts}P\n`;
  txt+=`累積積分：${S.points+S.sessionPts}P\n`;
  txt+=`稱號：${getCurrentTitle()}\n`;
  return txt;
}

function copyLog() {
  const txt = document.getElementById('sumContent').innerText;
  const done = () => showToast('📋 已複製到剪貼簿');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));
  } else { fallbackCopy(txt,done); }
}
function fallbackCopy(txt,cb) {
  const ta=document.createElement('textarea');
  ta.value=txt; ta.style.cssText='position:fixed;opacity:0;';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); ta.remove(); cb();
}
function showToast(msg) {
  const el=document.createElement('div');
  el.className='ach-toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

function saveHistory() {
  const total=S.tasks.length, done=S.tasks.filter(t=>t.done).length;
  // 記錄統計
  S.totalTrips++;
  if (done===total&&total>0) S.perfectTrips++;
  if (S.stamina===3) S.fullHeartTrips++;
  if (S.mode==='duo') S.duoTrips++;
  if (S.station && !S.visitedStations.includes(S.station)) S.visitedStations.push(S.station);
  S.points+=S.sessionPts;
  S.lv=Math.floor(S.points/800)+1;

  S.history.unshift({
    date:new Date().toLocaleDateString(),
    station:S.station||'未揭曉',
    pts:S.sessionPts, mode:S.mode, role:S.role,
    fullText:document.getElementById('sumContent').innerText
  });

  saveStats();
  checkAchievements();

  // reset session
  S.station=null; S.revealed=false;
  S.tasks=[]; S.sessionPts=0; S.log=[]; S.stamina=3;
  document.getElementById('sumOv').style.display='none';
  document.getElementById('phaseTask').classList.add('off');
  document.getElementById('phaseSpin').classList.remove('off');
  updateHeader(); renderJournal();
}

// ════════════════════════════════
//  UI
// ════════════════════════════════
function updateHeader() {
  document.getElementById('hPts').innerText  = S.points+S.sessionPts;
  document.getElementById('hLv').innerText   = S.lv;
  document.getElementById('hName').innerText = S.user||'---';
  document.getElementById('hTitle').innerText= `── ${getCurrentTitle()} ──`;
  let rl='---';
  if (S.mode==='solo') rl='🧍單人';
  else if (S.mode==='duo') rl=S.role==='nav'?'🧭導航長':'🍱補給官';
  document.getElementById('hRole').innerText=rl;
}

function showPop(txt, e) {
  const el=document.createElement('div');
  el.className='pp'; el.innerText=txt;
  const x=e?e.clientX-20:window.innerWidth/2;
  const y=e?e.clientY-10:window.innerHeight/2;
  el.style.left=x+'px'; el.style.top=y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

// ════════════════════════════════
//  JOURNAL — 全部用 DOM API，避免 h.fullText 內含反引號或 ${ 炸掉 template literal
// ════════════════════════════════
function renderJournal() {
  const list = document.getElementById('jList');
  list.innerHTML = '';

  if (!S.history.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;opacity:.2;padding:18px;font-size:.7rem;';
    empty.textContent = '尚無紀錄';
    list.appendChild(empty);
    return;
  }

  S.history.forEach(function(h, i) {
    // 外層
    const ji = document.createElement('div');
    ji.className = 'ji';
    ji.id = 'ji' + i;

    // header
    const jh = document.createElement('div');
    jh.className = 'jh';
    jh.dataset.ji = i;

    const jinfo = document.createElement('div');
    const jdate = document.createElement('div');
    jdate.textContent = '📅 ' + h.date + ' ・ ' + h.station + '站';
    const jmeta = document.createElement('div');
    jmeta.className = 'jm';
    const roleLabel = h.mode==='duo' ? (h.role==='nav' ? '🧭導航長' : '🍱補給官') : '🧍單人';
    jmeta.textContent = roleLabel + ' ｜ +' + (h.pts||0) + 'P';
    jinfo.appendChild(jdate);
    jinfo.appendChild(jmeta);

    const chev = document.createElement('span');
    chev.className = 'jchev';
    chev.textContent = '▼';

    jh.appendChild(jinfo);
    jh.appendChild(chev);

    // body
    const jb = document.createElement('div');
    jb.className = 'jb';

    const ta = document.createElement('textarea');
    ta.className = 'jtxt';
    ta.readOnly = true;
    ta.value = h.fullText;   // .value 不走 HTML 解析，完全安全

    const delBtn = document.createElement('button');
    delBtn.className = 'jdel';
    delBtn.dataset.del = i;
    delBtn.textContent = '🗑️ 刪除此紀錄';

    jb.appendChild(ta);
    jb.appendChild(delBtn);
    ji.appendChild(jh);
    ji.appendChild(jb);
    list.appendChild(ji);
  });
}

// Event delegation — header 點擊展開，刪除按鈕刪除
document.addEventListener('click', function(e) {
  const jh = e.target.closest('.jh');
  if (jh) {
    document.getElementById('ji' + jh.dataset.ji).classList.toggle('open');
    return;
  }
  const del = e.target.closest('.jdel');
  if (del) {
    // 不用 confirm()，改用自製簡易確認（confirm 在某些 GitHub Pages 設定會被擋）
    const i = parseInt(del.dataset.del);
    del.textContent = '再按一次確認刪除';
    del.style.background = 'rgba(200,50,50,.5)';
    del.dataset.confirm = '1';
    return;
  }
  // 二次確認刪除
  const del2 = e.target.closest('.jdel[data-confirm="1"]');
  if (del2) {
    const i = parseInt(del2.dataset.del);
    S.history.splice(i, 1);
    localStorage.setItem('rmb_history', JSON.stringify(S.history));
    renderJournal();
  }
});

init();
</script>
</body>
</html>
