<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道大冒險 v5.1 - 冒險者模式</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #3498db; --gold: #ffd700; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; overflow-x: hidden; }
        
        /* 頂部狀態欄 */
        .status-bar { width: 100%; max-width: 400px; background: rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 0.8rem; }
        
        .header { text-align: center; color: var(--paper); margin-bottom: 20px; }
        .header h1 { font-size: 1.8rem; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* 轉盤區塊 */
        .wheel-container { display: flex; flex-direction: column; align-items: center; }
        .wheel-wrap { position: relative; margin-bottom: 25px; cursor: pointer; }
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.6), 0 0 0 4px var(--gold); background: #333; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; width: 30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        /* 按鈕樣式 */
        .btn { padding: 15px 30px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #spinBtn { background: linear-gradient(135deg, var(--accent), #f07a2a); color: white; }
        #spinBtn:disabled { background: #666; opacity: 0.5; }

        /* 任務翻牌區 */
        .mission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; width: 100%; max-width: 400px; }
        .card { height: 120px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .card.flipped { transform: rotateY(180deg); background: white; color: #333; font-size: 0.9rem; padding: 10px; text-align: center; font-weight: bold; }
        .card-back { position: absolute; backface-visibility: hidden; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .card-front { position: absolute; backface-visibility: hidden; width: 100%; height: 100%; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }

        /* 結果卡片 */
        #resultCard { width: 100%; max-width: 420px; background: var(--paper); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); margin-top: 10px; border-top: 12px solid var(--accent); position: relative; }
        .station-name { font-size: 3rem; font-weight: 900; color: #1a1008; margin: 10px 0; letter-spacing: -2px; }
        .badge-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 15px; }
        .tag { background: rgba(0,0,0,0.1); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; }

        .hide { display: none !important; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div id="statProgress">進度: 0 / 15</div>
        <div id="statCurrent">目前狀態: 準備出發</div>
    </div>

    <div class="header">
        <h1>🚆 鐵道大冒險</h1>
    </div>

    <div id="phaseSpin" class="wheel-container">
        <div class="wheel-wrap" onclick="startSpin()">
            <svg class="pointer" viewBox="0 0 28 36"><polygon points="14,34 2,4 26,4" fill="#ffd700" stroke="#1a1008" stroke-width="2"/></svg>
            <canvas id="wheelCanvas" width="320" height="320"></canvas>
        </div>
        <button id="spinBtn" class="btn" onclick="startSpin()">🎲 揭曉下一站</button>
        <p style="color:var(--paper); opacity:0.6; font-size:0.8rem; margin-top:20px;">點擊轉盤或按鈕開始</p>
    </div>

    <div id="phaseTask" class="hide">
        <div id="resultCard">
            <div style="font-size:0.9rem; color:var(--accent); font-weight:900;">📍 目前抵達</div>
            <div id="resName" class="station-name">---</div>
            <div id="resInfo" style="font-size:0.9rem; margin-bottom:20px; color:#555;"></div>
            
            <hr style="border:0; border-top:1px dashed #ccc;">
            
            <p style="font-weight:900; margin-bottom:10px;">🎁 隨機任務 (三選一翻牌)</p>
            <div class="mission-grid" id="missionGrid">
                </div>

            <div style="margin-top:25px;">
                <button onclick="completeStation()" class="btn" style="width:100%; background:var(--green); color:white; margin-bottom:10px;">✅ 完成挑戰，存入紀錄</button>
                <button onclick="resetCurrent()" style="width:100%; background:none; border:none; color:#999; font-size:0.7rem; text-decoration:underline; cursor:pointer;">放棄此站，重新轉盤</button>
            </div>
        </div>
    </div>

    <div id="recordArea" style="margin-top:40px; width:100%; max-width:400px; color:white; text-align:center;">
        <div style="font-size:0.7rem; opacity:0.5; margin-bottom:10px;">已征服的站點</div>
        <div id="badges" class="badge-list" style="justify-content:center;"></div>
        <button onclick="hardReset()" style="margin-top:40px; background:none; border:none; color:#444; font-size:0.6rem;">[ 清除所有冒險紀錄 ]</button>
    </div>

    <script>
        const STATIONS = [
            { name: "瑞芳", city: "新北", food: "龍鳳腿" }, { name: "侯硐", city: "新北", food: "礦工麵" },
            { name: "十分", city: "新北", food: "花生捲" }, { name: "福隆", city: "新北", food: "便當" },
            { name: "礁溪", city: "宜蘭", food: "蔥油餅" }, { name: "平溪", city: "新北", food: "麵茶" },
            { name: "菁桐", city: "新北", food: "雞捲" }, { name: "內灣", city: "新竹", food: "野薑花粽" },
            { name: "三義", city: "苗栗", food: "粄條" }, { name: "大里", city: "宜蘭", food: "石花凍" },
            { name: "合興", city: "新竹", food: "下午茶" }, { name: "崎頂", city: "苗栗", food: "西瓜" },
            { name: "談文", city: "苗栗", food: "乾貨" }, { name: "三坑", city: "新竹", food: "菜包" },
            { name: "富岡", city: "桃園", food: "豬腳" }
        ];

        const MISSION_POOL = [
            "找陽光/燈光灑落處拍一張合照 📸", "買一份在地美食並與站牌合影 🍱", "尋找站內編號 001 的東西 🔍", 
            "模仿路人的姿勢拍一張照 🕺", "找出這站最老舊的物件 ⏰", "找出有趣的路標或警告標語 📍", 
            "跟店員或路人說謝謝並獲得微笑 😊", "全家在出口拍一張『跳躍成功』照 🤸"
        ];

        // 遊戲狀態
        let state = {
            currentStation: JSON.parse(localStorage.getItem('tr_active')) || null,
            history: JSON.parse(localStorage.getItem('tr_history')) || [],
            angle: 0,
            speed: 0,
            isSpinning: false
        };

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function init() {
            if (state.currentStation) {
                showPhase('task');
            } else {
                showPhase('spin');
            }
            updateUI();
            requestAnimationFrame(animate);
        }

        // 核心循環：繪製隱藏轉盤
        function animate() {
            if (state.isSpinning) {
                state.angle += state.speed;
                if (state.speed > 0.002) state.speed *= 0.985; 
                else {
                    state.isSpinning = false;
                    finishSpin();
                }
            }
            drawWheel();
            requestAnimationFrame(animate);
        }

        function drawWheel() {
            const r = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const slice = (Math.PI * 2) / STATIONS.length;

            STATIONS.forEach((st, i) => {
                const s = state.angle + i * slice - Math.PI / 2;
                ctx.beginPath(); ctx.moveTo(r, r); ctx.arc(r, r, r - 5, s, s + slice);
                ctx.fillStyle = i % 2 ? "#d4a84b" : "#e8c97a";
                if (state.history.includes(st.name)) ctx.fillStyle = "#444";
                ctx.fill(); ctx.stroke();

                // 蓋牌效果：轉盤上只顯示序號或問號
                ctx.save(); ctx.translate(r, r); ctx.rotate(s + slice / 2 + Math.PI / 2);
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
                ctx.fillText(i + 1, 0, -r * 0.75);
                ctx.restore();
            });
        }

        function startSpin() {
            if (state.isSpinning || state.currentStation) return;
            state.isSpinning = true;
            state.speed = 0.3 + Math.random() * 0.2;
            document.getElementById('spinBtn').disabled = true;
        }

        function finishSpin() {
            const stopAngle = ((-state.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const idx = Math.floor(stopAngle / ((Math.PI * 2) / STATIONS.length));
            state.currentStation = STATIONS[idx];
            localStorage.setItem('tr_active', JSON.stringify(state.currentStation));
            
            setTimeout(() => {
                showPhase('task');
                updateUI();
            }, 800);
        }

        function showPhase(p) {
            if (p === 'spin') {
                document.getElementById('phaseSpin').classList.remove('hide');
                document.getElementById('phaseTask').classList.add('hide');
                document.getElementById('spinBtn').disabled = false;
            } else {
                document.getElementById('phaseSpin').classList.add('hide');
                document.getElementById('phaseTask').classList.remove('hide');
                renderCards();
            }
        }

        // 翻牌機制
        function renderCards() {
            const grid = document.getElementById('missionGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-back">?</div>
                    <div class="card-front">${MISSION_POOL[Math.floor(Math.random() * MISSION_POOL.length)]}</div>
                `;
                card.onclick = function() { 
                    if(!this.classList.contains('flipped')) {
                        // 只允許翻一張
                        document.querySelectorAll('.card').forEach(c => c.style.pointerEvents = 'none');
                        this.classList.add('flipped');
                    }
                };
                grid.appendChild(card);
            }
        }

        function completeStation() {
            if (!state.history.includes(state.currentStation.name)) {
                state.history.push(state.currentStation.name);
                localStorage.setItem('tr_history', JSON.stringify(state.history));
            }
            resetCurrent(false);
        }

        function resetCurrent(confirmNeed = true) {
            if (confirmNeed && !confirm("確定要放棄本站冒險並重抽嗎？")) return;
            state.currentStation = null;
            localStorage.removeItem('tr_active');
            showPhase('spin');
            updateUI();
        }

        function updateUI() {
            if (state.currentStation) {
                document.getElementById('resName').innerText = state.currentStation.name;
                document.getElementById('resInfo').innerText = `🚂 城市：${state.currentStation.city} | 🍱 推薦：${state.currentStation.food}`;
                document.getElementById('statCurrent').innerText = `目前站點: ${state.currentStation.name}`;
            } else {
                document.getElementById('statCurrent').innerText = `目前狀態: 準備抽選`;
            }
            document.getElementById('statProgress').innerText = `進度: ${state.history.length} / ${STATIONS.length}`;
            document.getElementById('badges').innerHTML = state.history.map(h => `<span class="tag">✓ ${h}</span>`).join('');
        }

        function hardReset() {
            if (confirm("這會刪除所有冒險紀錄，確定嗎？")) {
                localStorage.clear();
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
