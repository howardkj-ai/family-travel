<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道大冒險 v4.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #2a1800; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 12px; color: var(--paper); }
        .header h1 { font-size: 1.8rem; margin: 0; letter-spacing: 0.15em; }
        
        /* Wheel */
        .wheel-wrap { position: relative; margin-bottom: 20px; }
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 0 4px var(--accent), 0 10px 40px rgba(0,0,0,0.6); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; width: 30px; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px 24px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; font-size: 1rem; transition: 0.2s; }
        #actionBtn { background: linear-gradient(135deg, #d4580a, #f07a2a); color: white; min-width: 120px; }
        #actionBtn.stop { background: #b52a1e; }

        /* Card System */
        #resultCard { width: 100%; max-width: 400px; background: var(--paper); border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; }
        .station-header { border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 15px; }
        .station-name { font-size: 2.8rem; font-weight: 900; margin: 0; line-height: 1; }
        .station-jp { color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        
        /* Mission UI */
        #missionTrigger { width: 100%; background: var(--accent); color: white; margin-top: 15px; padding: 15px; font-size: 1.1rem; }
        #missionDisplay { display: none; margin-top: 20px; }
        .mission-step { background: rgba(0,0,0,0.04); border-left: 4px solid var(--accent); padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .mission-tag { font-size: 0.7rem; color: var(--accent); font-weight: 900; }
        .mission-text { display: block; font-size: 1rem; font-weight: 700; margin-top: 4px; }
        .complete-btn { background: var(--green); color: white; font-size: 0.8rem; padding: 4px 10px; border-radius: 4px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚆 鐵道大冒險</h1>
        <p style="opacity:0.5; font-size:0.7rem; font-family:monospace;">STATION TRIGGER v4.2</p>
    </div>

    <div class="wheel-wrap">
        <svg class="pointer" viewBox="0 0 28 36"><polygon points="14,34 2,4 26,4" fill="#d4580a" stroke="#2a1800" stroke-width="2"/></svg>
        <canvas id="wheelCanvas" width="320" height="320"></canvas>
    </div>

    <div class="btn-row">
        <button id="actionBtn">🎲 開始轉動</button>
    </div>

    <div id="resultCard">
        <div class="station-header">
            <div id="resJp" class="station-jp"></div>
            <div id="resName" class="station-name"></div>
            <div id="resFood" style="color:var(--green); font-size:0.85rem; font-weight:bold; margin-top:10px;"></div>
        </div>

        <button id="missionTrigger" onclick="startMissions()">📜 領取冒險任務</button>

        <div id="missionDisplay">
            <div class="mission-step" id="step1Box">
                <span class="mission-tag">第一階段：初來乍到</span>
                <span id="t1" class="mission-text"></span>
                <button class="complete-btn" onclick="nextStep(2)">完成任務</button>
            </div>
            <div class="mission-step" id="step2Box" style="opacity:0.3">
                <span class="mission-tag">第二階段：深度探索</span>
                <span id="t2" class="mission-text">—— 尚未解鎖 ——</span>
                <button id="b2" class="complete-btn" style="display:none" onclick="nextStep(3)">完成任務</button>
            </div>
        </div>
    </div>

    <script>
        const STATIONS = [
            { name: "瑞芳", jp: "ルイファン", food: "龍鳳腿、熱油麻糬" },
            { name: "侯硐", jp: "ホウトン", food: "大麵章、古早味麵店" },
            { name: "十分", jp: "シーフェン", food: "周氏蝦捲、花生捲冰淇淋" },
            { name: "福隆", jp: "フロン", food: "正宗福隆便當、石花凍" },
            { name: "礁溪", jp: "ジャオシー", food: "蔥油餅、奶凍捲" },
            { name: "平溪", jp: "ピンシー", food: "天燈餅、古早味麵茶" },
            { name: "菁桐", jp: "セイトウ", food: "楊家雞捲、礦工食堂" },
            { name: "內灣", jp: "ナイワン", food: "野薑花粽、客家擂茶" },
            { name: "三義", jp: "サンイー", food: "客家板條、木雕餅" },
            { name: "大里", jp: "ダイリ", food: "現撈海鮮、石花菜" },
            { name: "合興", jp: "コウキョウ", food: "愛情火車下午茶" },
            { name: "崎頂", jp: "キチョウ", food: "海邊小食、西瓜" },
            { name: "談文", jp: "ダンブン", food: "在地小農乾貨" },
            { name: "三坑", jp: "サンコウ", food: "客家菜包、牛汶水" },
            { name: "富岡", jp: "フコウ", food: "仙草加工品、豬腳" }
        ];

        const MISSION_POOL = {
            s1: ["找出車站的站牌合照 📸", "在車站大廳找歷史看板 📖", "找站務員問地標 🚉"],
            s2: ["找三家在地老店 🏚️", "找建築最古老的部分 🏠", "走一條沒走過的小路 🛤️"]
        };

        let angle = 0, speed = 0, state = "IDLE";
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            const r = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const slice = (Math.PI * 2) / STATIONS.length;
            STATIONS.forEach((st, i) => {
                const start = angle + i * slice - Math.PI/2;
                ctx.beginPath();
                ctx.moveTo(r, r); ctx.arc(r, r, r - 5, start, start + slice);
                ctx.fillStyle = i % 2 ? "#e8c97a" : "#d4a84b";
                ctx.fill(); ctx.stroke();
                ctx.save(); ctx.translate(r, r); ctx.rotate(start + slice/2 + Math.PI/2);
                ctx.fillStyle = "#1a1008"; ctx.font = "bold 13px serif"; ctx.textAlign = "center";
                ctx.fillText(st.name, 0, -r * 0.7); ctx.restore();
            });
        }

        function update() {
            if (state === "SPINNING") angle += speed;
            else if (state === "SLOWING") {
                speed *= 0.985; angle += speed;
                if (speed < 0.002) { state = "IDLE"; finish(); }
            }
            draw(); requestAnimationFrame(update);
        }

        document.getElementById('actionBtn').onclick = function() {
            if (state === "IDLE") {
                state = "SPINNING"; speed = 0.2;
                this.innerText = "🛑 停！"; this.classList.add("stop");
                document.getElementById('resultCard').style.display = 'none';
            } else if (state === "SPINNING") {
                state = "SLOWING"; this.style.display = "none";
            }
        };

        function finish() {
            const stopAngle = ((-angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const idx = Math.floor(stopAngle / ((Math.PI * 2) / STATIONS.length));
            const st = STATIONS[idx];
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resName').innerText = st.name;
            document.getElementById('resJp').innerText = st.jp;
            document.getElementById('resFood').innerText = "🍱 推薦美食：" + st.food;
            document.getElementById('missionTrigger').style.display = "block";
            document.getElementById('missionDisplay').style.display = "none";
            document.getElementById('actionBtn').style.display = "inline-block";
            document.getElementById('actionBtn').innerText = "🎲 再次轉動";
            document.getElementById('actionBtn').classList.remove("stop");
        }

        window.startMissions = function() {
            document.getElementById('missionTrigger').style.display = "none";
            document.getElementById('missionDisplay').style.display = "block";
            document.getElementById('t1').innerText = MISSION_POOL.s1[Math.floor(Math.random()*3)];
            // 重置第二階段
            document.getElementById('step2Box').style.opacity = "0.3";
            document.getElementById('t2').innerText = "—— 尚未解鎖 ——";
            document.getElementById('b2').style.display = "none";
        };

        window.nextStep = function(step) {
            if(step === 2) {
                document.getElementById('step2Box').style.opacity = "1";
                document.getElementById('t2').innerText = MISSION_POOL.s2[Math.floor(Math.random()*3)];
                document.getElementById('b2').style.display = "inline-block";
            } else {
                alert("🎉 本站任務達成！");
            }
        };

        update();
    </script>
</body>
</html>
