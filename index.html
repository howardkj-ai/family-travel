<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道大冒險 v4.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #2a1800; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #2c3e50; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 12px; color: var(--paper); }
        .header h1 { font-size: 1.8rem; margin: 0; letter-spacing: 0.15em; }
        
        .wheel-wrap { position: relative; margin-bottom: 20px; }
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 0 4px var(--accent), 0 10px 40px rgba(0,0,0,0.6); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; width: 30px; }

        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px 24px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; font-size: 1rem; transition: 0.2s; }
        #actionBtn { background: linear-gradient(135deg, #d4580a, #f07a2a); color: white; min-width: 120px; }
        #actionBtn.stop { background: #b52a1e; }

        /* Card Styling */
        #resultCard { width: 100%; max-width: 400px; background: var(--paper); border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; border-top: 8px solid var(--accent); }
        .meta-info { display: flex; gap: 8px; margin-bottom: 5px; }
        .badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; color: white; font-weight: 900; }
        .badge-city { background: var(--blue); }
        .badge-time { background: var(--green); }
        
        .station-name { font-size: 3rem; font-weight: 900; margin: 0; line-height: 1.1; }
        .station-jp { color: var(--accent); font-weight: bold; font-size: 1.1rem; }
        .station-desc { font-size: 0.9rem; line-height: 1.6; margin: 12px 0; color: #444; border-left: 2px solid #ccc; padding-left: 10px; }
        
        #missionTrigger { width: 100%; background: var(--accent); color: white; margin-top: 15px; padding: 15px; font-size: 1.1rem; border-radius: 8px; }
        #missionDisplay { display: none; margin-top: 20px; }
        .mission-step { background: rgba(0,0,0,0.04); border-left: 4px solid var(--accent); padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .mission-text { display: block; font-size: 1rem; font-weight: 700; margin-top: 4px; }
        .complete-btn { background: var(--green); color: white; font-size: 0.8rem; padding: 4px 10px; border-radius: 4px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚆 鐵道大冒險</h1>
        <p style="opacity:0.5; font-size:0.7rem; font-family:monospace;">TRAVEL GUIDE v4.3</p>
    </div>

    <div class="wheel-wrap">
        <svg class="pointer" viewBox="0 0 28 36"><polygon points="14,34 2,4 26,4" fill="#d4580a" stroke="#2a1800" stroke-width="2"/></svg>
        <canvas id="wheelCanvas" width="320" height="320"></canvas>
    </div>

    <div class="btn-row">
        <button id="actionBtn">🎲 開始轉動</button>
    </div>

    <div id="resultCard">
        <div class="meta-info">
            <span id="resCity" class="badge badge-city"></span>
            <span id="resTime" class="badge badge-time"></span>
        </div>
        <div id="resJp" class="station-jp"></div>
        <div id="resName" class="station-name"></div>
        
        <div id="resDesc" class="station-desc"></div>
        <div id="resFood" style="color:var(--accent); font-size:0.9rem; font-weight:bold; background:rgba(212,88,10,0.1); padding:8px; border-radius:5px;"></div>

        <button id="missionTrigger" onclick="startMissions()">📜 領取冒險任務</button>

        <div id="missionDisplay">
            <div class="mission-step" id="step1Box">
                <span style="font-size:0.7rem; color:var(--accent); font-weight:900;">STEP 1</span>
                <span id="t1" class="mission-text"></span>
                <button class="complete-btn" onclick="nextStep(2)">完成任務</button>
            </div>
            <div class="mission-step" id="step2Box" style="opacity:0.3">
                <span style="font-size:0.7rem; color:var(--accent); font-weight:900;">STEP 2</span>
                <span id="t2" class="mission-text">—— 尚未解鎖 ——</span>
                <button id="b2" class="complete-btn" style="display:none" onclick="nextStep(3)">完成任務</button>
            </div>
        </div>
    </div>

    <script>
        const STATIONS = [
            { name: "瑞芳", jp: "ルイファン", city: "新北市", time: "約 40min", desc: "通往九份、金瓜石與平溪線的樞紐，保留濃厚的礦業小鎮氣息。", food: "龍鳳腿、熱油麻糬" },
            { name: "侯硐", jp: "ホウトン", city: "新北市", time: "約 50min", desc: "曾是台灣產煤量最高的地方，現為知名的貓村與礦業遺址。", food: "大麵章、古早味麵店" },
            { name: "十分", jp: "シーフェン", city: "新北市", time: "約 70min", desc: "天燈的發源地，鐵軌緊鄰住宅的景象是其最大特色。", food: "周氏蝦捲、花生捲冰淇淋" },
            { name: "福隆", jp: "フロン", city: "新北市", time: "約 65min", desc: "擁有北部最棒的沙灘，也是草嶺古道自行車之旅的起點。", food: "正宗福隆便當、石花凍" },
            { name: "礁溪", jp: "ジャオシー", city: "宜蘭縣", time: "約 90min", desc: "平地溫泉勝地，一出站就有免費泡腳池可舒緩壓力。", food: "蔥油餅、奶凍捲" },
            { name: "平溪", jp: "ピンシー", city: "新北市", time: "約 80min", desc: "保有古樸氣息的山城，每年元宵節的天燈盛會聞名國際。", food: "天燈餅、古早味麵茶" },
            { name: "菁桐", jp: "セイトウ", city: "新北市", time: "約 85min", desc: "平溪線終點站，擁有的日式木造車站是熱門拍照點。", food: "楊家雞捲、礦工食堂" },
            { name: "內灣", jp: "ナイワン", city: "新竹縣", time: "約 95min", desc: "濃濃客家風情的小鎮，內灣戲院與老街充滿懷舊美感。", food: "野薑花粽、客家擂茶" },
            { name: "三義", jp: "サンイー", city: "苗栗縣", time: "約 110min", desc: "台灣木雕之鄉，鄰近勝興車站與龍騰斷橋遺址。", food: "客家板條、木雕餅" },
            { name: "大里", jp: "ダイリ", city: "宜蘭縣", time: "約 80min", desc: "背山面海，是登草嶺古道看海景的最佳門戶。", food: "現撈海鮮、石花菜" },
            { name: "合興", jp: "コウキョウ", city: "新竹縣", time: "約 100min", desc: "被稱為「愛情火車站」，原本廢站後由私人認養保留。", food: "愛情火車下午茶" },
            { name: "崎頂", jp: "キチョウ", city: "苗栗縣", time: "約 90min", desc: "擁有神似《你的名字》場景的樓梯，與日式鐵路隧道。", food: "海邊小食、西瓜" },
            { name: "談文", jp: "ダンブン", city: "苗栗縣", time: "約 105min", desc: "海線五大木造車站之一，建築結構極具歷史美感。", food: "在地小農乾貨" },
            { name: "三坑", jp: "サンコウ", city: "新竹縣", time: "約 70min", desc: "雖然不在火車主線上，但這站是著名的客家聚落與老屋區。", food: "客家菜包、牛汶水" },
            { name: "富岡", jp: "フコウ", city: "桃園市", time: "約 60min", desc: "擁有獨特的伯公岡老街，也是台鐵重要的車輛維修基地。", food: "仙草加工品、豬腳" }
        ];

        const MISSION_POOL = {
            s1: ["找出車站的站牌合照 📸", "在車站大廳找歷史看板 📖", "找站務員問地標 🚉", "拍一張車站外最醒目的地標照片"],
            s2: ["找三家在地老店 🏚️", "找建築最古老的部分 🏠", "走一條沒走過的小路 🛤️", "觀察這站的人們在做什麼並記下來"]
        };

        let angle = 0, speed = 0, state = "IDLE";
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            const r = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const slice = (Math.PI * 2) / STATIONS.length;
            STATIONS.forEach((st, i) => {
                const start = angle + i * slice - Math.PI/2;
                ctx.beginPath();
                ctx.moveTo(r, r); ctx.arc(r, r, r - 5, start, start + slice);
                ctx.fillStyle = i % 2 ? "#e8c97a" : "#d4a84b";
                ctx.fill(); ctx.stroke();
                ctx.save(); ctx.translate(r, r); ctx.rotate(start + slice/2 + Math.PI/2);
                ctx.fillStyle = "#1a1008"; ctx.font = "bold 13px serif"; ctx.textAlign = "center";
                ctx.fillText(st.name, 0, -r * 0.7); ctx.restore();
            });
        }

        function update() {
            if (state === "SPINNING") angle += speed;
            else if (state === "SLOWING") {
                speed *= 0.985; angle += speed;
                if (speed < 0.001) { state = "IDLE"; finish(); }
            }
            draw(); requestAnimationFrame(update);
        }

        document.getElementById('actionBtn').onclick = function() {
            if (state === "IDLE") {
                state = "SPINNING"; speed = 0.2 + Math.random()*0.1;
                this.innerText = "🛑 停！"; this.classList.add("stop");
                document.getElementById('resultCard').style.display = 'none';
            } else if (state === "SPINNING") {
                state = "SLOWING"; this.style.display = "none";
            }
        };

        function finish() {
            const stopAngle = ((-angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const idx = Math.floor(stopAngle / ((Math.PI * 2) / STATIONS.length));
            const st = STATIONS[idx];
            
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resName').innerText = st.name;
            document.getElementById('resJp').innerText = st.jp;
            document.getElementById('resCity').innerText = "📍 " + st.city;
            document.getElementById('resTime').innerText = "🕒 車程約 " + st.time;
            document.getElementById('resDesc').innerText = st.desc;
            document.getElementById('resFood').innerText = "🍱 必吃美食：" + st.food;
            
            document.getElementById('missionTrigger').style.display = "block";
            document.getElementById('missionDisplay').style.display = "none";
            document.getElementById('actionBtn').style.display = "inline-block";
            document.getElementById('actionBtn').innerText = "🎲 再次轉動";
            document.getElementById('actionBtn').classList.remove("stop");
        }

        window.startMissions = function() {
            document.getElementById('missionTrigger').style.display = "none";
            document.getElementById('missionDisplay').style.display = "block";
            document.getElementById('t1').innerText = MISSION_POOL.s1[Math.floor(Math.random()*MISSION_POOL.s1.length)];
            document.getElementById('step2Box').style.opacity = "0.3";
            document.getElementById('t2').innerText = "—— 尚未解鎖 ——";
            document.getElementById('b2').style.display = "none";
        };

        window.nextStep = function(step) {
            if(step === 2) {
                document.getElementById('step2Box').style.opacity = "1";
                document.getElementById('t2').innerText = MISSION_POOL.s2[Math.floor(Math.random()*MISSION_POOL.s2.length)];
                document.getElementById('b2').style.display = "inline-block";
            } else {
                alert("🎉 本站任務達成！全家一起拍張勝利照吧！");
            }
        };

        update();
    </script>
</body>
</html>
