<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚆 鐵道大冒險 v5.2 - 積分積分版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1008; --paper: #f5ead6; --accent: #d4580a; --green: #2e7d32; --blue: #3498db; --gold: #ffd700; --epic: #9b59b6; }
        body { background: var(--bg); color: #1a1008; font-family: 'Noto Serif TC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; min-height: 100vh; }
        
        .status-bar { width: 100%; max-width: 400px; background: rgba(0,0,0,0.5); color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 0.85rem; border: 1px solid var(--gold); }
        .header h1 { color: var(--paper); font-size: 1.8rem; margin: 0 0 15px 0; }

        /* 轉盤 */
        .wheel-wrap { position: relative; margin-bottom: 20px; cursor: pointer; }
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.6); background: #333; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 10; width: 30px; }

        /* 任務卡片 */
        .mission-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; width: 100%; }
        .card { height: 130px; background: var(--accent); border-radius: 12px; perspective: 1000px; cursor: pointer; position: relative; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 8px; box-sizing: border-box; }
        .card-back { background: linear-gradient(45deg, var(--accent), #f07a2a); color: white; font-size: 2rem; font-weight: 900; }
        .card-front { background: white; transform: rotateY(180deg); font-size: 0.8rem; flex-direction: column; border: 2px solid var(--gold); }
        
        /* 難度標籤 */
        .diff { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; font-weight: 900; }
        .diff.easy { background: #e8f5e9; color: var(--green); }
        .diff.hard { background: #fff3e0; color: var(--accent); }
        .diff.epic { background: #f3e5f5; color: var(--epic); }

        /* 結果卡片 */
        #resultCard { width: 100%; max-width: 420px; background: var(--paper); border-radius: 20px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); margin-top: 5px; border-top: 10px solid var(--accent); }
        .station-name { font-size: 2.8rem; font-weight: 900; margin: 5px 0; }
        
        /* 列表樣式 */
        .done-list { font-size: 0.75rem; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; margin: 10px 0; max-height: 100px; overflow-y: auto; text-align: left; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-family: inherit; transition: 0.2s; width: 100%; margin-bottom: 8px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }

        /* 紀錄牆 */
        .badge-item { background: rgba(255,255,255,0.15); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .del-btn { color: #ff6b6b; cursor: pointer; font-weight: 900; padding: 0 5px; }
        
        .hide { display: none !important; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>💰 總分: <span id="totalPoints">0</span></div>
        <div>🏆 站點: <span id="statProgress">0</span>/15</div>
    </div>

    <div class="header"><h1>🚆 鐵道大冒險</h1></div>

    <div id="phaseSpin" class="wheel-container">
        <div class="wheel-wrap" onclick="startSpin()">
            <svg class="pointer" viewBox="0 0 28 36"><polygon points="14,34 2,4 26,4" fill="#ffd700" stroke="#1a1008" stroke-width="2"/></svg>
            <canvas id="wheelCanvas" width="300" height="300"></canvas>
        </div>
        <button id="spinBtn" class="btn btn-blue" onclick="startSpin()">🎲 揭曉下一站</button>
    </div>

    <div id="phaseTask" class="hide">
        <div id="resultCard">
            <div id="lunchAlert" class="hide" style="background:var(--gold); font-size:0.7rem; padding:4px; border-radius:5px; margin-bottom:10px; text-align:center; font-weight:900;">🔥 本站積分達標！解鎖加菜獎勵！</div>
            <div id="resName" class="station-name">---</div>
            <div id="resInfo" style="font-size:0.8rem; color:#666; margin-bottom:10px;"></div>
            
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:900; font-size:0.9rem;">🎁 任務抽選</span>
                <span style="font-size:0.8rem; color:var(--accent);">本站累計: +<span id="sessionPoints">0</span> P</span>
            </div>

            <div class="mission-grid" id="missionGrid"></div>

            <button id="nextMissionBtn" class="btn btn-blue hide" onclick="renderCards()">🔄 換一組任務 (刷分)</button>
            
            <div style="font-size:0.7rem; margin:10px 0 5px 0; font-weight:900;">本站已完成：</div>
            <div id="doneList" class="done-list">尚無紀錄</div>

            <button onclick="completeStation()" class="btn btn-green">🚩 結束本站行程</button>
            <button onclick="resetCurrent()" style="background:none; border:none; color:#999; font-size:0.6rem; cursor:pointer; width:100%;">放棄此站</button>
        </div>
    </div>

    <div style="margin-top:30px; width:100%; max-width:400px; text-align:center;">
        <div style="color:var(--paper); opacity:0.5; font-size:0.7rem; margin-bottom:10px;">—— 冒險紀錄牆 ——</div>
        <div id="badges" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;"></div>
    </div>

    <script>
        const STATIONS = [
            { name: "瑞芳", city: "新北", food: "龍鳳腿" }, { name: "侯硐", city: "新北", food: "礦工麵" },
            { name: "十分", city: "新北", food: "花生捲" }, { name: "福隆", city: "新北", food: "便當" },
            { name: "礁溪", city: "宜蘭", food: "蔥油餅" }, { name: "平溪", city: "新北", food: "麵茶" },
            { name: "菁桐", city: "新北", food: "雞捲" }, { name: "內灣", city: "新竹", food: "野薑花粽" },
            { name: "三義", city: "苗栗", food: "粄條" }, { name: "大里", city: "宜蘭", food: "石花凍" },
            { name: "合興", city: "新竹", food: "下午茶" }, { name: "崎頂", city: "苗栗", food: "西瓜" },
            { name: "談文", city: "苗栗", food: "乾貨" }, { name: "三坑", city: "新竹", food: "菜包" },
            { name: "富岡", city: "桃園", food: "豬腳" }
        ];

        const MISSIONS = [
            { t: "拍一張全家跳躍照", d: "easy", p: 50 },
            { t: "尋找站內編號001的物品", d: "hard", p: 150 },
            { t: "找在地人推薦一間店", d: "hard", p: 150 },
            { t: "模仿路標或雕像合照", d: "easy", p: 50 },
            { t: "找出這站最老的設施", d: "hard", p: 150 },
            { t: "在月台拍火車進站縮時", d: "epic", p: 300 },
            { t: "買到當站限定的小吃", d: "easy", p: 50 },
            { t: "找出隱藏在車站的印章", d: "hard", p: 150 },
            { t: "拍一張充滿電影感的空景", d: "epic", p: 300 }
        ];

        let state = {
            currentStation: JSON.parse(localStorage.getItem('tr_active')) || null,
            history: JSON.parse(localStorage.getItem('tr_history')) || [],
            totalPoints: parseInt(localStorage.getItem('tr_points')) || 0,
            sessionPoints: 0,
            sessionDone: [],
            angle: 0,
            speed: 0,
            isSpinning: false
        };

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function init() {
            if (state.currentStation) showPhase('task');
            else showPhase('spin');
            updateUI();
            requestAnimationFrame(animate);
        }

        function animate() {
            if (state.isSpinning) {
                state.angle += state.speed;
                state.speed *= 0.985;
                if (state.speed < 0.002) { state.isSpinning = false; finishSpin(); }
            }
            drawWheel();
            requestAnimationFrame(animate);
        }

        function drawWheel() {
            const r = canvas.width / 2;
            ctx.clearRect(0, 0, 300, 300);
            const slice = (Math.PI * 2) / STATIONS.length;
            STATIONS.forEach((st, i) => {
                const s = state.angle + i * slice - Math.PI / 2;
                ctx.beginPath(); ctx.moveTo(r, r); ctx.arc(r, r, r - 5, s, s + slice);
                ctx.fillStyle = state.history.some(h => h.name === st.name) ? "#444" : (i % 2 ? "#d4a84b" : "#e8c97a");
                ctx.fill(); ctx.stroke();
                ctx.save(); ctx.translate(r, r); ctx.rotate(s + slice / 2 + Math.PI / 2);
                ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.font = "bold 14px Arial";
                ctx.fillText("?", 0, -r * 0.7); ctx.restore();
            });
        }

        function startSpin() {
            if (state.isSpinning || state.currentStation) return;
            state.isSpinning = true;
            state.speed = 0.3 + Math.random() * 0.2;
            document.getElementById('spinBtn').disabled = true;
        }

        function finishSpin() {
            const stopAngle = ((-state.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const idx = Math.floor(stopAngle / ((Math.PI * 2) / STATIONS.length));
            state.currentStation = STATIONS[idx];
            state.sessionPoints = 0;
            state.sessionDone = [];
            localStorage.setItem('tr_active', JSON.stringify(state.currentStation));
            setTimeout(() => { showPhase('task'); updateUI(); }, 500);
        }

        function renderCards() {
            const grid = document.getElementById('missionGrid');
            grid.innerHTML = '';
            document.getElementById('nextMissionBtn').classList.add('hide');
            const shuffled = [...MISSIONS].sort(() => 0.5 - Math.random()).slice(0, 3);
            shuffled.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">?</div>
                        <div class="card-front">
                            <span class="diff ${m.d}">${m.d.toUpperCase()}</span>
                            <div style="font-weight:900;">${m.t}</div>
                            <div style="color:var(--accent); font-size:0.7rem; margin-top:5px;">+${m.p}P</div>
                        </div>
                    </div>
                `;
                card.onclick = function() {
                    if(!this.classList.contains('flipped')) {
                        this.classList.add('flipped');
                        state.sessionPoints += m.p;
                        state.sessionDone.push(`${m.t} (+${m.p}P)`);
                        document.getElementById('nextMissionBtn').classList.remove('hide');
                        updateUI();
                    }
                };
                grid.appendChild(card);
            });
        }

        function showPhase(p) {
            if (p === 'spin') {
                document.getElementById('phaseSpin').classList.remove('hide');
                document.getElementById('phaseTask').classList.add('hide');
                document.getElementById('spinBtn').disabled = false;
            } else {
                document.getElementById('phaseSpin').classList.add('hide');
                document.getElementById('phaseTask').classList.remove('hide');
                renderCards();
            }
        }

        function updateUI() {
            document.getElementById('totalPoints').innerText = state.totalPoints;
            document.getElementById('statProgress').innerText = state.history.length;
            if (state.currentStation) {
                document.getElementById('resName').innerText = state.currentStation.name;
                document.getElementById('resInfo').innerText = `📍${state.currentStation.city} | 🍱${state.currentStation.food}`;
                document.getElementById('sessionPoints').innerText = state.sessionPoints;
                document.getElementById('doneList').innerHTML = state.sessionDone.length ? state.sessionDone.join('<br>') : '尚無紀錄';
                // 午餐機制：本站滿 200 分提示
                document.getElementById('lunchAlert').className = state.sessionPoints >= 200 ? '' : 'hide';
            }
            // 紀錄牆顯示
            document.getElementById('badges').innerHTML = state.history.map((h, i) => `
                <div class="badge-item">
                    ${h.name} (+${h.p}P) 
                    <span class="del-btn" onclick="deleteHistory(${i})">×</span>
                </div>
            `).join('');
        }

        function completeStation() {
            state.totalPoints += state.sessionPoints;
            state.history.push({ name: state.currentStation.name, p: state.sessionPoints });
            localStorage.setItem('tr_points', state.totalPoints);
            localStorage.setItem('tr_history', JSON.stringify(state.history));
            resetCurrent(false);
        }

        function deleteHistory(index) {
            if(confirm("確定刪除這條紀錄？積分也會扣除喔！")) {
                state.totalPoints -= state.history[index].p;
                state.history.splice(index, 1);
                localStorage.setItem('tr_points', state.totalPoints);
                localStorage.setItem('tr_history', JSON.stringify(state.history));
                updateUI();
            }
        }

        function resetCurrent(confirmNeed = true) {
            if (confirmNeed && !confirm("確定放棄本站？積分將不會儲存。")) return;
            state.currentStation = null;
            localStorage.removeItem('tr_active');
            showPhase('spin');
            updateUI();
        }

        init();
    </script>
</body>
</html>
